// ── Intelligence Network Background ───────────────────────────────────
// Nodes = prospects/leads; connections = research pathways; radar = active scan
function IntelligenceBg({ intensity }) {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf;
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);

    const N = 44;
    const nodes = Array.from({ length: N }, (_, i) => ({
      x: Math.random(), y: Math.random(),
      vx: (Math.random() - 0.5) * 0.000095,
      vy: (Math.random() - 0.5) * 0.000095,
      r: Math.random() * 1.3 + 0.7,
      phase: Math.random() * Math.PI * 2,
      // some nodes are "active" (larger, brighter) simulating researched leads
      active: i < 8,
    }));

    // A few "highlight" connection pairs that flicker to life one at a time
    const highlights = Array.from({ length: 6 }, () => ({
      a: Math.floor(Math.random() * N),
      b: Math.floor(Math.random() * N),
      life: Math.random() * 200,
      maxLife: 180 + Math.random() * 120,
    }));

    let t = 0;
    let radarR = 0;
    const maxRadar = () => Math.max(canvas.width, canvas.height) * 0.92;

    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      t++;

      // Update nodes
      nodes.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if (n.x < -0.04) n.x = 1.04;
        if (n.x > 1.04) n.x = -0.04;
        if (n.y < -0.04) n.y = 1.04;
        if (n.y > 1.04) n.y = -0.04;
      });

      // Connection lines between proximate nodes
      const thresh = Math.min(canvas.width, canvas.height) * 0.19;
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const dx = (nodes[i].x - nodes[j].x) * canvas.width;
          const dy = (nodes[i].y - nodes[j].y) * canvas.height;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < thresh) {
            const op = (1 - d / thresh) * 0.16 * intensity;
            ctx.strokeStyle = `rgba(240,160,32,${op})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x * canvas.width, nodes[i].y * canvas.height);
            ctx.lineTo(nodes[j].x * canvas.width, nodes[j].y * canvas.height);
            ctx.stroke();
          }
        }
      }

      // Highlight connections (animated flicker)
      highlights.forEach(h => {
        h.life++;
        if (h.life > h.maxLife) {
          h.a = Math.floor(Math.random() * N);
          h.b = Math.floor(Math.random() * N);
          h.life = 0;
          h.maxLife = 180 + Math.random() * 120;
        }
        const prog = h.life / h.maxLife;
        const op = Math.sin(prog * Math.PI) * 0.55 * intensity;
        const na = nodes[h.a], nb = nodes[h.b];
        const grd = ctx.createLinearGradient(
          na.x * canvas.width, na.y * canvas.height,
          nb.x * canvas.width, nb.y * canvas.height
        );
        grd.addColorStop(0, `rgba(240,160,32,${op})`);
        grd.addColorStop(0.5, `rgba(255,184,48,${op * 1.5})`);
        grd.addColorStop(1, `rgba(240,160,32,${op})`);
        ctx.strokeStyle = grd;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(na.x * canvas.width, na.y * canvas.height);
        ctx.lineTo(nb.x * canvas.width, nb.y * canvas.height);
        ctx.stroke();
      });

      // Draw nodes
      nodes.forEach(n => {
        const pulse = 0.5 + 0.5 * Math.sin(t * 0.012 + n.phase);
        const baseOp = n.active ? 0.55 : 0.28;
        const op = (baseOp + (n.active ? 0.3 : 0.18) * pulse) * intensity;
        const nr = n.active ? n.r * 1.7 : n.r;

        if (n.active) {
          // Halo for active nodes
          const grad = ctx.createRadialGradient(
            n.x * canvas.width, n.y * canvas.height, 0,
            n.x * canvas.width, n.y * canvas.height, nr * 4
          );
          grad.addColorStop(0, `rgba(240,160,32,${op * 0.4})`);
          grad.addColorStop(1, 'rgba(240,160,32,0)');
          ctx.beginPath();
          ctx.arc(n.x * canvas.width, n.y * canvas.height, nr * 4, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
        }
        ctx.beginPath();
        ctx.arc(n.x * canvas.width, n.y * canvas.height, nr, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(240,160,32,${op})`;
        ctx.fill();
      });

      // Radar rings from upper-center (where the glow is)
      const cx = canvas.width / 2;
      const cy = canvas.height * 0.28;
      const mr = maxRadar();
      radarR = (radarR + 0.55) % mr;
      for (let ring = 0; ring < 3; ring++) {
        const r = (radarR + ring * (mr / 3)) % mr;
        const op = Math.max(0, (1 - r / mr) * 0.09 * intensity);
        if (op < 0.004) continue;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(240,160,32,${op})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, [intensity]);

  return <canvas ref={ref} style={{ position:'fixed', top:0, left:0, width:'100%', height:'100%', pointerEvents:'none', zIndex:0 }} />;
}

// ── Hooks ─────────────────────────────────────────────────────────────
function useScrollReveal(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

// ── Counter ───────────────────────────────────────────────────────────
function Counter({ target, suffix='', start, duration=2200 }) {
  const [val, setVal] = useState(0);
  const ran = useRef(false);
  useEffect(() => {
    if (!start || ran.current) return;
    ran.current = true;
    const t0 = performance.now();
    const tick = (now) => {
      const p = Math.min((now - t0) / duration, 1);
      setVal(Math.round((1 - Math.pow(1 - p, 4)) * target));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [start]);
  return <>{val.toLocaleString()}{suffix}</>;
}

// ── Buttons ───────────────────────────────────────────────────────────
function CTAButton({ href, children, large, onClick }) {
  const [hov, setHov] = useState(false);
  const s = {
    display:'inline-flex', alignItems:'center',
    padding: large ? '16px 40px' : '12px 24px',
    background: hov
      ? `linear-gradient(135deg, ${C.accentGold}, ${C.accent})`

    color:'#0b0b0f', borderRadius:10, border:'none', cursor:'pointer',
    fontFamily:FF, fontWeight:700, fontSize: large ? 16 : 14,
    textDecoration:'none', whiteSpace:'nowrap',
    transition:'transform 0.22s ease, box-shadow 0.22s ease, background 0.2s',
    transform: hov ? 'scale(1.04)' : 'scale(1)',
    boxShadow: hov ? '0 8px 36px rgba(240,160,32,0.5)' : '0 4px 20px rgba(240,160,32,0.22)',
  };
  return href
    ? <a href={href} style={s} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>{children}</a>
    : <button style={s} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={onClick}>{children}</button>;
}

function GhostButton({ children, onClick }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{
      padding:'15px 26px', background:'transparent',

      borderRadius:10, color: hov ? C.text : C.muted,
      fontFamily:FF, fontWeight:600, fontSize:15, cursor:'pointer',
      transition:'border-color 0.2s, color 0.2s',
    }}>{children}</button>
  );
}

// ── Bracket Frame (ToDesktop-inspired corner decoration) ──────────────
function BracketFrame({ children }) {
  const bc = 'rgba(240,160,32,0.32)';
  const sz = 16, w = 1.5;
  const corners = [
    { top:0, left:0,  borderTop:`${w}px solid ${bc}`, borderLeft:`${w}px solid ${bc}` },
    { top:0, right:0, borderTop:`${w}px solid ${bc}`, borderRight:`${w}px solid ${bc}` },
    { bottom:0, left:0,  borderBottom:`${w}px solid ${bc}`, borderLeft:`${w}px solid ${bc}` },
    { bottom:0, right:0, borderBottom:`${w}px solid ${bc}`, borderRight:`${w}px solid ${bc}` },
  ];
  return (
    <div style={{ position:'relative', display:'inline-block', padding:'16px 28px' }}>
      {corners.map((s, i) => (
        <div key={i} style={{ position:'absolute', width:sz, height:sz, ...s }} />
      ))}
      {children}
    </div>
  );
}

function TweaksPanel({ tweaks, setTweak, onClose }) {
  const labelStyle = { fontSize:11, fontWeight:700, color:'#888898', textTransform:'uppercase', letterSpacing:'0.7px', display:'block', marginBottom:8, fontFamily:FF };

    <div style={{ position:'fixed', bottom:24, right:24, width:272, zIndex:10000, background:'rgba(18,18,28,0.97)', border:'1px solid #2c2c3c', borderRadius:14, boxShadow:'0 24px 72px rgba(0,0,0,0.7)', overflow:'hidden', backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)' }}>

        </div>

          <span style={{ ...labelStyle, marginBottom:0 }}>Features Section</span>

// ── App ───────────────────────────────────────────────────────────────
function App() {
  const [scrolled, setScrolled] = useState(false);
  const [tweaks, setTweaksState] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 50);
    window.addEventListener('scroll', onScroll, { passive:true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  useEffect(() => {
    const handler = ({ data }) => {
      if (data?.type === '__activate_edit_mode') setShowTweaks(true);
      else if (data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (key, value) => {
    setTweaksState(prev => {
      const next = { ...prev, [key]:value };
      window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [key]:value } }, '*');
      return next;
    });
  };

  const scrollToLicense = () => {
    const el = document.getElementById('license-section');
    if (!el) return;
    const top = el.getBoundingClientRect().top + window.pageYOffset - 80;
    window.scrollTo({ top, behavior:'smooth' });
  };

  return (
    <div style={{ background:C.bg, minHeight:'100vh' }}>
      <IntelligenceBg intensity={tweaks.bgIntensity} />
      <LightRays />
      <RadialGlow />
      <Header scrolled={scrolled} />
      <Hero headline={tweaks.headline} onLicenseClick={scrollToLicense} showPreview={tweaks.showPreview} />
      {tweaks.showStats && <Stats />}
      {tweaks.showFeatures && <Features />}
      {window.FeaturesShowcase && React.createElement(window.FeaturesShowcase)}
      <BottomCTA onLicenseClick={scrollToLicense} />
      <LicenseSection />
      <Footer />
      {showTweaks && (
        <TweaksPanel tweaks={tweaks} setTweak={setTweak}
          onClose={() => { setShowTweaks(false); window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*'); }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
