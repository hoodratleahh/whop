<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recon — AI Lead Discovery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous" onerror="window.__libErr='Failed to load React. Check your internet connection and reload.'"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous" onerror="window.__libErr='Failed to load ReactDOM. Check your internet connection and reload.'"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous" onerror="window.__libErr='Failed to load Babel. Check your internet connection and reload.'"></script>
<style>
:root {
  --bg:      #0b0b0f;
  --s1:      #111116;
  --s2:      #17171e;
  --s3:      #1e1e27;
  --border:  #25252f;
  --border2: #31313e;
  --amber:   #f0a020;
  --amber2:  #fbbf24;
  --amberDim:rgba(240,160,32,.10);
  --amberGlow:0 0 28px rgba(240,160,32,.14);
  --green:   #22c55e;
  --greenDim:rgba(34,197,94,.10);
  --red:     #ef4444;
  --redDim:  rgba(239,68,68,.10);
  --yellow:  #f59e0b;
  --blue:    #3b82f6;
  --blueDim: rgba(59,130,246,.10);
  --text:    #edeef2;
  --text2:   #888898;
  --text3:   #55556a;
  --sans:    'Plus Jakarta Sans', sans-serif;
  --mono:    'DM Mono', monospace;
  --r:       10px;
  --rsm:     6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* LAYOUT */
.app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* SIDEBAR */
.sidebar{width:216px;min-width:216px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column}
.logo-wrap{padding:22px 20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:30px;height:30px;position:relative;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:30px;height:30px}
.logo-name{font-size:17px;font-weight:800;letter-spacing:-.4px}
.logo-name span{color:var(--amber)}
.sidebar-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:10px 10px 6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--rsm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .14s;border:none;background:none;width:100%;text-align:left;position:relative}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item.active{background:var(--amberDim);color:var(--amber);border:1px solid rgba(240,160,32,.18)}
.nav-item .badge{margin-left:auto;background:var(--amber);color:var(--bg);font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;font-family:var(--mono)}
.sidebar-foot{padding:14px 10px;border-top:1px solid var(--border)}
.credits-wrap{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.credits-label{font-size:11px;color:var(--text3);margin-bottom:7px;display:flex;justify-content:space-between}
.credits-track{height:3px;background:var(--s3);border-radius:99px;overflow:hidden}
.credits-fill{height:100%;background:var(--amber);border-radius:99px;width:40%}
.credits-num{font-size:11px;color:var(--text2);margin-top:6px;font-family:var(--mono)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 26px;gap:14px;background:var(--s1);flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700}
.topbar-sub{font-size:12px;color:var(--text3)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.page{flex:1;overflow-y:auto;padding:24px 26px}

/* CARDS */
.card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r)}
.card-glow{background:var(--s2);border:1px solid rgba(240,160,32,.25);border-radius:var(--r);box-shadow:var(--amberGlow)}
.card-dark{background:var(--s1);border:1px solid var(--border);border-radius:var(--r)}

/* STAT GRID */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;transition:border-color .18s}
.stat-card:hover{border-color:rgba(240,160,32,.25)}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text3)}
.stat-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-val{font-size:30px;font-weight:800;line-height:1;margin-bottom:4px;font-family:var(--mono);letter-spacing:-.02em}
.stat-sub{font-size:11px;color:var(--text3)}
.stat-val.amber{color:var(--amber)}
.stat-val.green{color:var(--green)}
.stat-val.white{color:var(--text)}

/* QUICK ACTIONS */
.qa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:26px}
.qa-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px}
.qa-card:hover{border-color:rgba(240,160,32,.3);transform:translateY(-1px)}
.qa-icon{width:34px;height:34px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--amberDim);color:var(--amber)}
.qa-title{font-size:13.5px;font-weight:700}
.qa-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* SECTION HEADER */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:14px;font-weight:700}
.sec-sub{font-size:11px;color:var(--text3);margin-top:2px}
.view-all{font-size:12px;color:var(--amber);cursor:pointer;display:flex;align-items:center;gap:4px;opacity:.8;transition:opacity .12s}
.view-all:hover{opacity:1}

/* LEAD LIST */
.lead-list{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.lead-row{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.lead-row:last-child{border-bottom:none}
.lead-row:hover{background:var(--s3)}
.lead-name{font-size:13.5px;font-weight:600;flex:1}
.lead-meta{font-size:11px;color:var(--text3);margin-top:2px}

/* SCORE BADGE */
.score{width:36px;height:36px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--mono);flex-shrink:0}
.score.hi{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.score.mid{background:var(--amberDim);color:var(--amber);border:1px solid rgba(240,160,32,.25)}
.score.lo{background:var(--redDim);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.score-sm{width:30px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mono)}
.score-sm.hi{background:rgba(34,197,94,.15);color:var(--green)}
.score-sm.mid{background:var(--amberDim);color:var(--amber)}
.score-sm.lo{background:var(--redDim);color:var(--red)}

/* STATUS PILLS */
.pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.05em;display:inline-block}
.pill.new{background:var(--s3);color:var(--text2);border:1px solid var(--border2)}
.pill.called{background:var(--blueDim);color:var(--blue);border:1px solid rgba(59,130,246,.25)}
.pill.interested{background:var(--amberDim);color:var(--amber);border:1px solid rgba(240,160,32,.25)}
.pill.followup{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.25)}
.pill.closed{background:var(--greenDim);color:var(--green);border:1px solid rgba(34,197,94,.25)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:var(--rsm);padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .14s}
.btn-primary{background:var(--amber);color:var(--bg)}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--amber);color:var(--amber)}
.btn-ghost:disabled{opacity:.4;cursor:not-allowed}

/* SEARCH BAR */
.search-bar{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);display:flex;margin-bottom:14px;transition:border-color .15s;position:relative}
.search-bar:focus-within{border-color:rgba(240,160,32,.35)}
.s-input{flex:1;background:none;border:none;padding:13px 16px;color:var(--text);font-size:14px;font-family:var(--sans);outline:none}
.s-input::placeholder{color:var(--text3)}
.s-div{width:1px;background:var(--border);margin:10px 0}
.s-btn{background:var(--amber);border:none;color:var(--bg);padding:0 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:opacity .14s;white-space:nowrap;display:flex;align-items:center;gap:7px;border-radius:0 var(--r) var(--r) 0;flex-shrink:0}
.s-btn:hover{opacity:.88}
.s-btn:disabled{opacity:.4;cursor:not-allowed}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text3)}
.chip{background:var(--s2);border:1px solid var(--border);border-radius:99px;padding:5px 13px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .12s;font-family:var(--sans);white-space:nowrap}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.on{background:var(--amberDim);border-color:rgba(240,160,32,.35);color:var(--amber)}

/* RESULTS BAR */
.results-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--amberDim);border:1px solid rgba(240,160,32,.2);border-radius:var(--rsm);margin-bottom:14px;font-size:13px}
.results-bar .count{color:var(--amber);font-weight:700;font-family:var(--mono)}
.results-bar .saved{color:var(--green);font-weight:700}

/* LEAD CARDS GRID */
.leads-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.lcard{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:all .14s}
.lcard:hover{border-color:rgba(240,160,32,.25);transform:translateY(-1px)}
.lcard-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px}
.lcard-name{font-size:13.5px;font-weight:700;line-height:1.35;flex:1;margin-right:10px}
.lcard-info{font-size:11.5px;color:var(--text2);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.lcard-info a{color:var(--amber);text-decoration:none}
.lcard-info a:hover{text-decoration:underline}
.no-site{background:var(--redDim);border:1px solid rgba(239,68,68,.2);color:var(--red);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.fb-site{background:var(--blueDim);border:1px solid rgba(59,130,246,.2);color:var(--blue);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}

/* ISSUES */
.issues-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.issues-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px}
.issue-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:3px 7px;border-radius:4px;margin:2px 3px 2px 0}
.issue-tag.critical{background:var(--redDim);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.issue-tag.warn{background:var(--amberDim);color:var(--amber);border:1px solid rgba(240,160,32,.2)}
.issue-tag.info{background:var(--s3);color:var(--text2);border:1px solid var(--border)}
.lcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.save-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:11.5px;font-weight:700;padding:6px 13px;border-radius:var(--rsm);cursor:pointer;font-family:var(--sans);transition:all .14s;display:flex;align-items:center;gap:5px}
.save-btn:hover{border-color:var(--amber);color:var(--amber)}
.save-btn.saved{background:var(--greenDim);border-color:rgba(34,197,94,.3);color:var(--green)}

/* SCANNING BAR */
.scanning{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--amberDim);border:1px solid rgba(240,160,32,.2);border-radius:var(--rsm);margin-bottom:12px;font-size:13px;color:var(--amber)}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}
.dot1{animation:blink 1.2s ease infinite 0s}
.dot2{animation:blink 1.2s ease infinite .2s}
.dot3{animation:blink 1.2s ease infinite .4s}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:620px;max-height:84vh;overflow-y:auto;padding:26px}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.modal-sub{font-size:12px;color:var(--text3);margin-top:3px}
.modal-close{background:var(--s2);border:1px solid var(--border);width:28px;height:28px;border-radius:var(--rsm);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0;font-size:14px;transition:all .12s}
.modal-close:hover{border-color:var(--border2);color:var(--text)}

/* AI BOX */
.ai-box{background:var(--amberDim);border:1px solid rgba(240,160,32,.2);border-radius:var(--r);padding:16px;margin-bottom:14px}
.ai-box-head{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--amber);margin-bottom:10px}
.ai-text{font-size:13px;line-height:1.7;color:var(--text2)}
.ai-dots{display:flex;align-items:center;gap:5px;color:var(--text3);font-size:13px}
.ai-d{width:5px;height:5px;border-radius:50%;background:var(--amber)}

/* AUDIT SECTION */
.audit{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.audit-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.audit-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.audit-row:last-child{border-bottom:none}
.audit-key{font-size:12.5px;color:var(--text2);display:flex;align-items:center;gap:6px}
.audit-val{font-size:12.5px;font-weight:700}
.audit-val.good{color:var(--green)}
.audit-val.bad{color:var(--red)}
.audit-val.warn{color:var(--amber)}
.audit-val.neutral{color:var(--text2)}

/* PROGRESS BAR */
.prog-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.prog-track{height:6px;background:var(--s3);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.22,1,.36,1)}

/* KANBAN */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;height:calc(100vh - 140px)}
.k-col{min-width:220px;width:220px;display:flex;flex-direction:column;flex-shrink:0}
.k-col-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--s2);border:1px solid var(--border);border-bottom:none;border-radius:var(--r) var(--r) 0 0}
.k-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em}
.k-count{font-size:10px;font-weight:700;font-family:var(--mono);background:var(--s3);padding:2px 7px;border-radius:4px;color:var(--text3)}
.k-col-body{flex:1;background:rgba(255,255,255,.012);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:8px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;min-height:120px}
.k-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:11px 13px;cursor:grab;transition:all .13s;user-select:none}
.k-card:hover{border-color:rgba(240,160,32,.25);transform:translateY(-1px)}
.k-card:active{cursor:grabbing}
.k-card.dragging{opacity:.3;border-style:dashed;transform:rotate(1.5deg)}
.k-col-body.drag-over{border-color:var(--amber)!important;background:rgba(240,160,32,.07);border-style:dashed}
.k-card-name{font-size:12.5px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.k-card-phone{font-size:10.5px;color:var(--text3);font-family:var(--mono)}
.k-status-sel{background:var(--s3);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:4px 7px;border-radius:4px;width:100%;cursor:pointer;font-family:var(--sans);outline:none}
.k-status-sel:focus{border-color:var(--amber)}
.ai-drawer{position:fixed;top:0;right:0;height:100vh;width:360px;background:var(--s1);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.3)}
.ai-drawer.open{transform:translateX(0)}
.ai-drawer-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ai-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px}
.ai-bubble{padding:10px 13px;border-radius:12px;font-size:12.5px;line-height:1.55;max-width:92%;white-space:pre-wrap}
.ai-bubble.user{background:var(--amber);color:#111;align-self:flex-end;border-radius:12px 12px 3px 12px;font-weight:500}
.ai-bubble.assistant{background:var(--s2);border:1px solid var(--border);align-self:flex-start;border-radius:3px 12px 12px 12px;color:var(--text2)}
.ai-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}

/* SETTINGS */
.settings-block{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:14px}
.settings-title{font-size:14px;font-weight:800;margin-bottom:3px}
.settings-sub{font-size:12px;color:var(--text3);margin-bottom:20px;line-height:1.6}
.field{margin-bottom:14px}
.field-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.07em}
.field-input{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 14px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;transition:border .12s}
.field-input:focus{border-color:rgba(240,160,32,.4)}
.field-input::placeholder{color:var(--text3)}
.field-hint{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5}
.api-status{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px}
.api-status.on{background:var(--greenDim);color:var(--green)}
.api-status.off{background:var(--redDim);color:var(--red)}

/* SCRIPT */
.script-tabs{display:flex;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;flex-shrink:0}
.script-tab{flex:1;padding:11px;border:none;background:transparent;color:var(--text3);font-size:12.5px;font-weight:700;cursor:pointer;font-family:var(--sans);border-bottom:2px solid transparent;transition:all .13s}

/* ── LLM COMPLETE (OpenRouter → Groq → error) ───────────── */
async function llmComplete(prompt, opts={}){
  const maxTokens = opts.maxTokens || 1400;
  const timeout = opts.timeout || 90000;
  const stored = localStorage.getItem('recon_whop_v1');
  const keys = stored ? (JSON.parse(stored).apiKeys||{}) : {};

  const withTimeout = async (promise, ms) => {
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(() => reject(new Error('timeout')), ms)
    );
    return Promise.race([promise, timeoutPromise]);
  };

  const callApi = async (url, config) => {
    const res = await withTimeout(
      fetch(url, config),
      timeout
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await withTimeout(
      res.json(),
      timeout
    );
    return data;
  };

  if(keys.openrouter){
    try {
      const d = await callApi('https://openrouter.ai/api/v1/chat/completions', {
        method:'POST',
        headers:{'Authorization':`Bearer ${keys.openrouter}`,'Content-Type':'application/json','HTTP-Referer':location.href},
        body:JSON.stringify({model:'anthropic/claude-3-haiku',messages:[{role:'user',content:prompt}],max_tokens:maxTokens}),
      });
      if(!d.choices?.[0]?.message?.content) throw new Error('Invalid response');
      return d.choices[0].message.content;
    } catch(e) {
      throw new Error(`OpenRouter: ${e.message}`);
    }
  }

  if(keys.groq){
    try {
      const d = await callApi('https://api.groq.com/openai/v1/chat/completions', {
        method:'POST',
        headers:{'Authorization':`Bearer ${keys.groq}`,'Content-Type':'application/json'},
        body:JSON.stringify({model:'llama3-8b-8192',messages:[{role:'user',content:prompt}],max_tokens:maxTokens}),
      });
      if(!d.choices?.[0]?.message?.content) throw new Error('Invalid response');
      return d.choices[0].message.content;
    } catch(e) {
      throw new Error(`Groq: ${e.message}`);
    }
  }

  throw new Error('no-key');
}

/* ── SOUND (Web Audio synth — no external files) ─────────── */
let _ctx=null;
const sound = (type)=>{
  try{
    if(!_ctx) _ctx = new (window.AudioContext||window.webkitAudioContext)();
    const ctx=_ctx; const now=ctx.currentTime;
    const o=ctx.createOscillator(); const g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    const presets={
      click:   { f:[660], dur:.06, vol:.04, type:'square' },
      pop:     { f:[440,880], dur:.12, vol:.08, type:'sine' },
      save:    { f:[523,659,784], dur:.18, vol:.08, type:'triangle' },
      success: { f:[523,659,784,1046], dur:.45, vol:.12, type:'triangle' },
      win:     { f:[523,659,784,1046,1318], dur:.7, vol:.15, type:'sine' },
      err:     { f:[200,150], dur:.2, vol:.08, type:'sawtooth' },
    };
    const p=presets[type]||presets.click;
    o.type=p.type;
    p.f.forEach((freq,i)=>o.frequency.setValueAtTime(freq, now+i*(p.dur/p.f.length)));
    g.gain.setValueAtTime(p.vol,now);
    g.gain.exponentialRampToValueAtTime(.0001, now+p.dur);
    o.start(now); o.stop(now+p.dur+.02);
  }catch(e){}
};

/* ── GATE SCREEN ─────────────────────────────────────────── */
function GateScreen({onSuccess}){
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const login = async () => {
    if(!email.trim() || !password){ setErr('Enter your email and password.'); return; }
    if(AUTH_API_BASE.includes('your-auth-api.com')){ setErr('Set AUTH_API_BASE in this file before using production auth.'); return; }
    setLoading(true); setErr('');
    try{
      const res = await fetch(`${AUTH_API_BASE}/auth/login`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:email.trim().toLowerCase(), password}),
      });
      const data = await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(data?.error || 'Login failed');
      const session = {
        token: data.token,
        email: data.email || email.trim().toLowerCase(),
        userId: data.userId || null,
      };
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      onSuccess(session, data.apiKeys || {});
    }catch(e){
      setErr(e.message || 'Unable to sign in.');
    }finally{
      setLoading(false);
    }
  };

  return (
    <div className="gate">
      <div className="gate-card fade-up">
        <div className="gate-logo">
          <svg viewBox="0 0 30 30" fill="none" width="32" height="32">
            <polygon points="15,2 28,8 28,22 15,28 2,22 2,8" stroke="#f0a020" strokeWidth="1.5" fill="none"/>
            <circle cx="15" cy="15" r="3" fill="#f0a020"/>
            <line x1="15" y1="5" x2="15" y2="10" stroke="#f0a020" strokeWidth="1" opacity=".5"/>
            <line x1="15" y1="20" x2="15" y2="25" stroke="#f0a020" strokeWidth="1" opacity=".5"/>
          </svg>
          <div className="gate-logo-name">Re<span>con</span></div>
        </div>
        <div className="gate-tagline">Sign in with the email and password from your purchase account.<br/>No license key needed.</div>

        <input
          className="gate-input"
          type="email"
          placeholder="you@company.com"
          value={email}
          onChange={e=>{setEmail(e.target.value);setErr('');}}
          autoFocus
        />
        <input
          className="gate-input"
          type="password"
          placeholder="Password"
          value={password}
          onChange={e=>{setPassword(e.target.value);setErr('');}}
          onKeyDown={e=>e.key==='Enter'&&login()}
        />
        <div className="gate-hint">Your backend should validate paid Whop users and return a signed session token.</div>

        {err && <div className="gate-err">⚠ {err}</div>}

        <button className="gate-btn" onClick={login} disabled={loading||!email.trim()||!password}>
          {loading
            ? <><span className="spinner" style={{borderTopColor:'var(--bg)',borderColor:'rgba(0,0,0,.2)'}}/>Signing in...</>
            : <>Sign In &amp; Enter Recon</>}
        </button>
      </div>
    </div>
  );
}

/* ── APP ─────────────────────────────────────────────────── */
function App(){
  const [page, setPage] = useState('dashboard');
  const [state, setState] = useState(loadState);
  const [modal, setModal] = useState(null);
  const [mascot, setMascot] = useState({state:'hi', msg:null, key:0});
  const [confetti, setConfetti] = useState(null);
  const [hkOpen, setHkOpen] = useState(false);
  const [xpPops, setXpPops] = useState([]);
  const [session, setSession] = useState(()=>{ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); }catch{return null;} });
  const [unlocked] = useState(true);
  const konamiRef = useRef([]);

  const save = s => { setState(s); localStorage.setItem('recon_whop_v1',JSON.stringify(s)); };

  // Daily streak calc
  useEffect(()=>{
    const today = new Date().toDateString();
    if(state.lastActiveDate !== today){
      const yesterday = new Date(Date.now()-86400000).toDateString();
      const newStreak = state.lastActiveDate === yesterday ? (state.streak||0)+1 : 1;
      save({...state, streak:newStreak, lastActiveDate:today});
    }
    // Welcome mascot pop on first mount
    setTimeout(()=>showMascot('hi'), 600);
  },[]);

  const showMascot = (kind, customMsg)=>{
    const m = MASCOT[kind] || MASCOT.idle;
    const msg = customMsg || m.msgs[Math.floor(Math.random()*m.msgs.length)];
    setMascot({state:kind, msg, key:Date.now()});
    setTimeout(()=>setMascot(m=>({...m,msg:null})), 4200);
  };

  const fireConfetti = ()=>{
    const colors=['#f0a020','#fbbf24','#22c55e','#3b82f6','#ef4444','#edeef2'];
    const pieces = Array.from({length:60},(_,i)=>({
      id:Date.now()+i,
      left: Math.random()*100,
      bg: colors[Math.floor(Math.random()*colors.length)],
      delay: Math.random()*0.4,
      rot: Math.random()*360,
    }));
    setConfetti(pieces);
    setTimeout(()=>setConfetti(null), 3200);
  };

  const grantXp = (amount, label)=>{
    // Pre-compute using current snapshot for side-effects (level-up detection)
    let xpSnap = (state.xp||0) + amount;
    let levelSnap = state.level||1;
    let leveledUp = false;
    while(xpSnap >= xpForLevel(levelSnap)){ xpSnap -= xpForLevel(levelSnap); levelSnap++; leveledUp = true; }

    // Functional update so we never overwrite concurrent state changes (e.g. saveLead)
    setState(s=>{
      let xp = (s.xp||0) + amount;
      let level = s.level||1;
      while(xp >= xpForLevel(level)){ xp -= xpForLevel(level); level++; }
      const next = {...s, xp, level};
      localStorage.setItem('recon_whop_v1',JSON.stringify(next));
      return next;
    });

    const id = Date.now()+Math.random();
    setXpPops(p=>[...p,{id, amount, label, x: 60+Math.random()*40, y: 40+Math.random()*20}]);
    setTimeout(()=>setXpPops(p=>p.filter(x=>x.id!==id)), 1400);
    if(leveledUp){ sound('win'); fireConfetti(); showMascot('closed',`LEVEL ${levelSnap}! 🔥`); }
  };

  const saveLead = lead => {
    if(state.savedLeads.find(l=>l.id===lead.id)) return;
    setState(s=>{
      const next = {...s,
        savedLeads:[{...lead,saved:true,savedAt:Date.now()},...s.savedLeads],
        stats:{...s.stats,totalLeads:s.stats.totalLeads+1}
      };
      localStorage.setItem('recon_whop_v1',JSON.stringify(next));
      return next;
    });
    sound('save'); showMascot('saved'); grantXp(XP_REWARDS.save,'+15 XP saved');
  };

  const updateStatus = (id,status) => {
    const prev = state.savedLeads.find(l=>l.id===id);
    const updated = state.savedLeads.map(l=>l.id===id?{...l,status}:l);
    const closed = updated.filter(l=>l.status==='closed').length;
    const revenue = updated.filter(l=>l.status==='closed').reduce((s,l)=>s+(l.monthlyValue||0),0);
    save({...state,savedLeads:updated,stats:{...state.stats,closed,revenue}});
    if(status==='closed' && prev?.status!=='closed'){
      sound('win'); fireConfetti(); showMascot('closed'); grantXp(XP_REWARDS.closed,'+75 XP CLOSED!');
    } else { sound('click'); grantXp(XP_REWARDS.status,'+8 XP'); }
  };

  const saveKeys = keys => { save({...state,apiKeys:keys}); sound('save'); };

  // Hotkeys
  useEffect(()=>{
    let lastG = 0;
    const handler = (e)=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
      const KONAMI=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
      konamiRef.current = [...konamiRef.current, e.key].slice(-10);
      if(konamiRef.current.join(',')===KONAMI.join(',')){
        document.documentElement.classList.toggle('konami');
        sound('win'); fireConfetti(); showMascot('closed','KONAMI CODE! party mode');
        konamiRef.current=[];
      }
      const now = Date.now();
      if(e.key==='g'){ lastG = now; return; }
      if(now-lastG < 800){
        const map={d:'dashboard',s:'search',t:'tracker',x:'script',k:'settings'};
        if(map[e.key]){ setPage(map[e.key]); sound('pop'); lastG=0; e.preventDefault(); return; }
      }
      if(e.key==='?'){ setHkOpen(o=>!o); sound('click'); }
      if(e.key==='Escape'){ setHkOpen(false); setModal(null); }
      if(e.key==='/'){ const i = document.querySelector('.s-input'); if(i){i.focus(); e.preventDefault();} }
    };
    window.addEventListener('keydown', handler);
    return ()=>window.removeEventListener('keydown', handler);
  },[]);

  // Daily quote (deterministic per day)
  const dayIdx = Math.floor(Date.now()/86400000) % QUOTES.length;
  const quote = QUOTES[dayIdx];

  const nav = [
    {id:'dashboard',label:'Dashboard',icon:'home'},
    {id:'search',   label:'Lead Search', icon:'search'},
    {id:'tracker',  label:'Tracker',     icon:'kanban', badge:state.savedLeads.filter(l=>l.status==='new').length||null},
    {id:'script',   label:'Script Gen',  icon:'script'},
    {id:'sites',    label:'Demo Sites',  icon:'globe'},
    {id:'settings', label:'Settings',    icon:'settings'},
  ];

  const pages = {
    dashboard:<Dashboard state={state} setPage={setPage} onSelect={setModal} quote={quote}/>,
    search:   <Search savedLeads={state.savedLeads} apiKeys={state.apiKeys} onSave={saveLead} onSelect={setModal} onSearchStart={()=>{sound('pop');showMascot('searching');}} onResults={n=>{grantXp(XP_REWARDS.search,'+5 XP');showMascot('found',`found ${n} leads!`);sound('success');}} onSerperSearch={()=>setState(s=>{const next={...s,serperUsage:(s.serperUsage||0)+1};localStorage.setItem('recon_whop_v1',JSON.stringify(next));return next;})}/>,
    tracker:  <Tracker leads={state.savedLeads} onStatus={updateStatus} onSelect={setModal} apiKeys={state.apiKeys}/>,
    script:   <ScriptGen savedLeads={state.savedLeads} onGen={()=>{sound('pop');showMascot('thinking');}} onDone={()=>{grantXp(XP_REWARDS.script,'+25 XP script');sound('success');showMascot('found','script ready!');}}/>,
    sites:    <DemoBuilder savedLeads={state.savedLeads} apiKeys={state.apiKeys}/>,
    settings: <Settings apiKeys={state.apiKeys} serperUsage={state.serperUsage||0} onSave={saveKeys}/>,
  };

  const pageLabels = {dashboard:'Dashboard',search:'Lead Search',tracker:'Lead Tracker',script:'Script Generator',sites:'Demo Sites',settings:'Settings'};

  if(!unlocked) return null;

  return (
    <div className="app">
      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="logo-wrap">
          <div className="logo-mark">
            <svg viewBox="0 0 30 30" fill="none">
              <polygon points="15,2 28,8 28,22 15,28 2,22 2,8" stroke="#f0a020" strokeWidth="1.5" fill="none"/>
              <circle cx="15" cy="15" r="3" fill="#f0a020"/>
              <line x1="15" y1="5" x2="15" y2="10" stroke="#f0a020" strokeWidth="1" opacity=".5"/>
              <line x1="15" y1="20" x2="15" y2="25" stroke="#f0a020" strokeWidth="1" opacity=".5"/>
            </svg>
          </div>
          <div className="logo-name">Re<span>con</span></div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">Menu</div>
          {nav.map(n=>(
            <button key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
              <Ic n={n.icon} s={15}/>
              {n.label}
              {n.badge ? <span className="badge">{n.badge}</span> : null}
            </button>
          ))}
        </nav>
        <div className="xp-wrap">
          <div className="xp-top">
            <span className="xp-lvl">LV.{state.level||1}</span>
            <span className="xp-streak">🔥<span> {state.streak||0}d</span> streak</span>
          </div>
          <div className="xp-track"><div className="xp-fill" style={{width:`${Math.min(100,((state.xp||0)/xpForLevel(state.level||1))*100)}%`}}/></div>
          <div style={{fontSize:10,color:'var(--text3)',marginTop:5,fontFamily:'var(--mono)',textAlign:'right'}}>{state.xp||0} / {xpForLevel(state.level||1)} XP</div>
        </div>
        <div style={{padding:'10px 14px 14px',borderTop:'1px solid var(--border)',marginTop:10}}>
          <div style={{fontSize:10,color:'var(--text3)',display:'flex',alignItems:'center',gap:6,cursor:'pointer'}} onClick={()=>{setHkOpen(true);sound('click');}}>
            <span className="hk">?</span> shortcuts
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">{pageLabels[page]}</div>
            <div className="topbar-sub">AI-powered local business lead discovery</div>
          </div>
          <div className="topbar-right">
            <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text3)'}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block'}}></span>
              AI Online
            </div>
          </div>
        </div>
        <div className="page">{pages[page]}</div>
      </div>

      {modal && <Modal lead={modal} onClose={()=>setModal(null)} onSave={saveLead} savedLeads={state.savedLeads}/>}
      <Mascot data={mascot}/>
      {confetti && <ConfettiStage pieces={confetti}/>}
      {xpPops.map(p=>(
        <div key={p.id} className="xp-pop" style={{position:'fixed',right:`${p.x}px`,bottom:`${110+p.y}px`,zIndex:120}}>{p.label}</div>
      ))}
      {hkOpen && <HotkeyModal onClose={()=>setHkOpen(false)}/>}
    </div>
  );
}

/* ── MASCOT COMPONENT ────────────────────────────────────── */
function Mascot({data}){
  const m = MASCOT[data.state] || MASCOT.idle;
  const [bouncing, setBouncing] = useState(false);
  useEffect(()=>{ setBouncing(true); const t=setTimeout(()=>setBouncing(false),600); return ()=>clearTimeout(t); },[data.key]);
  return (
    <div className="mascot">
      {data.msg && <div key={data.key+'-b'} className="mascot-bubble">{data.msg}</div>}
      <div className={`mascot-img${bouncing?' bouncing':''}`} title="click me!" onClick={()=>sound('pop')}>
        <span style={{display:'block',animation:m.anim}}>{m.emoji}</span>
      </div>
    </div>
  );
}

/* ── CONFETTI ────────────────────────────────────────────── */
function ConfettiStage({pieces}){
  return (
    <div className="confetti-stage">
      {pieces.map(p=>(
        <div key={p.id} className="confetti-piece" style={{left:`${p.left}%`,top:'-20px',background:p.bg,animationDelay:`${p.delay}s`,transform:`rotate(${p.rot}deg)`}}/>
      ))}
    </div>
  );
}

/* ── COMBO TYPEAHEAD COMPONENT ───────────────────────────── */
function ComboInput({value, onChange, placeholder, mode, onEnter}){
  const [open, setOpen]       = useState(false);
  const [opts, setOpts]       = useState([]);
  const [fetching, setFetch]  = useState(false);
  const [cursor, setCursor]   = useState(-1);
  const wrapRef  = useRef();
  const timerRef = useRef();

  // Close when clicking outside
  useEffect(()=>{
    const h = e=>{ if(wrapRef.current&&!wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[]);

  const filterNiches = v => NICHE_LIST.filter(n=>!v||n.toLowerCase().includes(v.toLowerCase()));

  const fetchPlaces = v => {
    clearTimeout(timerRef.current);
    if(v.length < 2){ setOpts([]); setOpen(false); setFetch(false); return; }
    setFetch(true);
    timerRef.current = setTimeout(async ()=>{
      try{
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(v)}&format=json&limit=10&addressdetails=1`,
          {headers:{'Accept-Language':'en'}}
        );
        const data = await res.json();
        const seen = new Set();
        const results = data.map(r=>{
          const a = r.address || {};
          const city  = a.city || a.town || a.village || a.hamlet || a.suburb || a.neighbourhood;
          const state = a.state || a.region || a.county;
          const country = a.country;
          const isUS = a.country_code === 'us';
          const main = city || state || country;
          const sub  = isUS
            ? [state, 'United States'].filter(Boolean).join(', ')
            : [state, country].filter(Boolean).join(', ');
          const full = isUS
            ? [city, state].filter(Boolean).join(', ')
            : [city || state, country].filter(Boolean).join(', ');
          if(!main || seen.has(full)) return null;
          seen.add(full);
          return {main, sub, full};
        }).filter(Boolean);
        setOpts(results);
        setOpen(results.length > 0);
      }catch(e){ setOpts([]); }
      setFetch(false);
    }, 320);
  };

  const handleChange = e => {
    const v = e.target.value;
    onChange(v);
    setCursor(-1);
    if(mode==='niche'){
      const f = filterNiches(v);
      setOpts(f.map(n=>({main:n,sub:'',full:n})));
      setOpen(true);
    } else {
      fetchPlaces(v);
    }
  };

  const handleFocus = () => {
    if(mode==='niche'){
      setOpts(filterNiches(value).map(n=>({main:n,sub:'',full:n})));
      setOpen(true);
    } else if(value.length>=2){
      fetchPlaces(value);
    }
  };

  const select = opt => {
    onChange(opt.full);
    setOpen(false);
    setCursor(-1);
  };

  const handleKey = e => {
    if(e.key==='ArrowDown'){ e.preventDefault(); setCursor(c=>Math.min(c+1,opts.length-1)); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); setCursor(c=>Math.max(c-1,-1)); }
    else if(e.key==='Enter'){
      if(cursor>=0 && opts[cursor]){ select(opts[cursor]); }
      else { setOpen(false); onEnter&&onEnter(); }
    }
    else if(e.key==='Escape'){ setOpen(false); }
  };

  return (
    <div className="combo-wrap" ref={wrapRef}>
      <input
        className="s-input"
        value={value}
        onChange={handleChange}
        onFocus={handleFocus}
        onKeyDown={handleKey}
        placeholder={placeholder}
        autoComplete="off"
        spellCheck="false"
      />
      {open && (
        <div className="combo-drop">
          {fetching && (
            <div className="combo-loading">
              <span className="ai-d dot1"/><span className="ai-d dot2"/><span className="ai-d dot3"/>
              Searching worldwide...
            </div>
          )}
          {!fetching && opts.length===0 && value.length>=2 && (
            <div className="combo-empty">No matches — try a different spelling</div>
          )}
          {opts.map((opt,i)=>(
            <div key={i} className={`combo-opt${cursor===i?' active':''}`} onMouseDown={()=>select(opt)}>
              <div className="combo-opt-main">{opt.main}</div>
              {opt.sub && <div className="combo-opt-sub">{opt.sub}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

async function geocodeLocation(query){
  const res = await fetch(
    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`,
    {headers:{'Accept-Language':'en'}}
  );
  const data = await res.json();
  if(!data.length) return null;
  return {lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), displayName: data[0].display_name};
}

async function fetchOsmBusinesses(niche, lat, lon){
  const tagPairs = OSM_TAGS[niche] || [['shop','*']];
  const radius = 20000; // 20 km
  const clauses = tagPairs.map(([k,v])=>
    `node["${k}"="${v}"](around:${radius},${lat},${lon});way["${k}"="${v}"](around:${radius},${lat},${lon});`
  ).join('');
  const query = `[out:json][timeout:25];(${clauses});out body;`;
  const res = await fetch('https://overpass-api.de/api/interpreter',{
    method:'POST', body:'data='+encodeURIComponent(query),
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
  });
  const data = await res.json();
  return (data.elements || []).filter(el=>el.tags && el.tags.name);
}

function buildIssuesAndScore(hasWeb, hasFb, phone, website, reviews){
  const issues=[];
  if(!hasWeb && !hasFb)                          issues.push('noWebsite');
  if(hasFb && !hasWeb)                           issues.push('fbOnly');
  if(hasWeb && website && !website.startsWith('https')) issues.push('noSSL');
  if(!phone)                                     issues.push('noContact');
  if(reviews !== null && reviews < 10)           issues.push('noGMB');
  const damages=[];
  if(issues.includes('noWebsite'))  damages.push('Missing from every Google search for their service');
  if(issues.includes('fbOnly'))     damages.push('Facebook organic reach is down 90% — near-zero visibility');
  if(issues.includes('noSSL'))      damages.push('Chrome flags their site as "Not Secure" — kills trust instantly');
  if(issues.includes('noContact'))  damages.push('No phone listed — prospects can\'t reach them without effort');
  if(issues.includes('noGMB'))      damages.push('Under 10 reviews — losing jobs to competitors with 50–200+');
  // Opportunity score: higher = easier sell (more problems = more value you bring)
  const base = hasWeb ? 30 : 80;
  const bonus = issues.includes('noSSL')?15:0
              + issues.includes('noContact')?10:0
              + issues.includes('noGMB')?8:0
              + issues.includes('fbOnly')?20:0;
  const score = Math.min(97, base + bonus);
  return {issues, damages, score};
}

/* Returns a website quality label + severity for display on lead cards */
function getSiteQuality(lead, auditPerf, auditMobile){
  if(!lead.hasWebsite) return null;
  const issues = lead.issues || [];
  const noSSL  = issues.includes('noSSL');
  // If we have live PageSpeed data, use it
  if(auditPerf !== undefined && auditPerf !== null){
    if(auditPerf < 30 || (!auditMobile && noSSL))
      return {label:'Very Poor Site', cls:'critical', tip:'Slow, insecure, or not mobile — losing most visitors'};
    if(auditPerf < 50 || noSSL)
      return {label:'Poor Site',      cls:'critical', tip:'Major issues costing them customers'};
    if(auditPerf < 70 || !auditMobile)
      return {label:'Needs Work',     cls:'warn',     tip:'Conversion problems — good pitch angle'};
    if(auditPerf < 85)
      return {label:'Average Site',   cls:'warn',     tip:'Room for improvement on speed & conversions'};
    return {label:'Decent Site',      cls:'ok',       tip:'Functional but still possible to improve conversions'};
  }
  // Without PageSpeed, judge from what we know
  if(noSSL)
    return {label:'Insecure Site', cls:'critical', tip:'No HTTPS — Chrome warns visitors'};
  return {label:'Has Website',    cls:'neutral',   tip:'Open modal to run full audit'};
}

function osmToLeads(elements, niche, location){
  return elements.slice(0,12).map((el,i)=>{
    const t = el.tags||{};
    const name    = t.name;
    const phone   = t.phone||t['contact:phone']||t['phone:mobile']||null; // no fake fallback
    const rawSite = t.website||t['contact:website']||t.url||null;
    const hasWeb  = !!rawSite;
    const hasFb   = !hasWeb && !!(t['contact:facebook']||t.facebook);
    const website = rawSite||(hasFb?(t['contact:facebook']||t.facebook):null);
    const email   = t.email||t['contact:email']||null;
    const addr    = [t['addr:housenumber'],t['addr:street'],t['addr:city']||location].filter(Boolean).join(' ')||location;
    const {issues,damages,score} = buildIssuesAndScore(hasWeb,hasFb,phone,website,null);
    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name+' '+location)}`;
    return {
      id:`l-${Date.now()}-${i}`, name, phone,
      rating: null, reviews: null,
      website, hasWebsite:hasWeb, hasFbOnly:hasFb, mapsUrl,
      issues, damages, score, niche, location,
      status:'new', saved:false, savedAt:null, email,
      address: addr, monthlyValue:Math.floor(Math.random()*400)+297,
      realData:true, source:'osm',
    };
  });
}

async function fetchSerperLeads(niche, location, apiKey, page=1){

    method:'POST',
    headers:{'X-API-KEY':apiKey,'Content-Type':'application/json'},
    body:JSON.stringify({q:`${niche} near ${location}`,gl:'us',hl:'en',num:20,page}),
  });
  if(!res.ok) throw new Error(`Serper ${res.status}`);
  const d = await res.json();
  return d.places || [];
}

function serperToLeads(places, niche, location){
  return places.map((p,i)=>{
    const name    = p.title || 'Unknown';
    const phone   = p.phoneNumber || null;
    const website = p.website || null;
    const hasWeb  = !!website;
    const rating  = p.rating ? parseFloat(p.rating) : null;
    const reviews = p.ratingCount ? parseInt(p.ratingCount) : null;
    const address = p.address || location;
    const cid     = p.cid || null;
    const placeId = p.placeId || null;
    const mapsUrl = cid
      ? `https://www.google.com/maps?cid=${cid}`
      : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name+' '+location)}`;
    const {issues, damages, score} = buildIssuesAndScore(hasWeb, false, phone, website, reviews);
    return {
      id:`sr-${Date.now()}-${i}`, name, phone, rating, reviews,
      website, hasWebsite:hasWeb, hasFbOnly:false,
      mapsUrl, cid, placeId, issues, damages, score, niche, location,
      status:'new', saved:false, savedAt:null, email:null,
      address, monthlyValue:Math.floor(Math.random()*400)+297,
      realData:true, source:'serper',
    };
  });
}

/* Fetch website for a single lead that Serper missed, using Google Places Details */
async function enrichLeadWebsite(lead, googleApiKey){
  if(!googleApiKey || lead.hasWebsite) return lead;
  try{
    // Try new Places API with placeId first
    if(lead.placeId){
      const r = await fetch(`https://places.googleapis.com/v1/places/${lead.placeId}`,{
        headers:{'X-Goog-Api-Key':googleApiKey,'X-Goog-FieldMask':'websiteUri'},
      });
      if(r.ok){
        const d = await r.json();
        if(d.websiteUri){
          const {issues,damages,score} = buildIssuesAndScore(true,false,lead.phone,d.websiteUri,lead.reviews);
          return {...lead,website:d.websiteUri,hasWebsite:true,issues,damages,score};
        }
      }
    }
    // Fallback: classic Places Details with CID
    if(lead.cid){
      const r = await fetch(`https://maps.googleapis.com/maps/api/place/details/json?cid=${lead.cid}&fields=website&key=${googleApiKey}`);
      if(r.ok){
        const d = await r.json();
        const website = d.result?.website || null;
        if(website){
          const {issues,damages,score} = buildIssuesAndScore(true,false,lead.phone,website,lead.reviews);
          return {...lead,website,hasWebsite:true,issues,damages,score};
        }
      }
    }
  }catch(e){}
  return lead;
}

/* ── SEARCH ──────────────────────────────────────────────── */
function Search({savedLeads,onSave,onSelect,onSearchStart,onResults,onSerperSearch,apiKeys}){
  const [niche,setNiche]=useState('');
  const [loc,setLoc]=useState('');
  const [loading,setLoading]=useState(false);
  const [loadingMore,setLoadingMore]=useState(false);
  const [results,setResults]=useState([]);
  const [meta,setMeta]=useState(null);
  const [dataSource,setDataSource]=useState(null);
  const [scanMsg,setScanMsg]=useState('');
  const [filters,setFilters]=useState({website:'any',rating:'any',phone:false});
  const [savedIds,setSavedIds]=useState(new Set(savedLeads.map(l=>l.id)));
  const [serperPage,setSerperPage]=useState(1);
  const [hasMore,setHasMore]=useState(false);

  useEffect(()=>{setSavedIds(new Set(savedLeads.map(l=>l.id)));},[savedLeads]);

  const run=async()=>{
    if(!niche.trim()||!loc.trim()) return;
    setLoading(true);setResults([]);setMeta(null);setDataSource(null);setSerperPage(1);setHasMore(false);
    onSearchStart && onSearchStart();
    const n=niche.trim(), l=loc.trim();

    // 1 — Serper.dev (Google local pack, real data, no billing)
    if(apiKeys?.serper){
      try{
        setScanMsg(`Searching Google for real ${n} businesses in ${l}...`);
        const places = await fetchSerperLeads(n, l, apiKeys.serper, 1);
        onSerperSearch && onSerperSearch();
        if(places.length > 0){
          const leads = serperToLeads(places, n, l);
          setResults(leads); setDataSource('serper');
          setMeta({niche:n,location:l});
          setSerperPage(1);
          setHasMore(places.length >= 20); // if full page, there may be more
          setLoading(false);
          onResults && onResults(leads.length);
          // Background: fill in missing websites via Google Places for leads that have a cid/placeId
          if(apiKeys?.google){
            const missing = leads.filter(ld=>!ld.hasWebsite && !ld.hasFbOnly && (ld.cid||ld.placeId));
            if(missing.length){
              setScanMsg(`Checking ${missing.length} listing${missing.length>1?'s':''} for missing websites...`);
              const enriched = await Promise.all(missing.map(ld=>enrichLeadWebsite(ld,apiKeys.google)));
              const enrichMap = new Map(enriched.map(ld=>[ld.id,ld]));
              setResults(prev=>prev.map(ld=>enrichMap.get(ld.id)||ld));
              setScanMsg('');
            }
          }
          return;
        }
      }catch(e){ /* fall through */ }
    }

    // 2 — Google Places API (real, live data)
    if(apiKeys?.google){
      try{
        setScanMsg(`Searching Google Places for real ${n} businesses in ${l}...`);
        const places = await fetchGooglePlaces(n, l, apiKeys.google);
        if(places.length > 0){
          const leads = googleToLeads(places, n, l);
          setResults(leads); setDataSource('google');
          setMeta({niche:n,location:l});
          setLoading(false);
          onResults && onResults(leads.length);
          return;
        }
      }catch(e){ /* fall through */ }
    }

    // 4 — OpenStreetMap Overpass (real, open data)
    try{
      setScanMsg(`Locating ${l}...`);
      const geo = await geocodeLocation(l);
      if(geo){
        setScanMsg(`Scanning real ${n} businesses near ${l}...`);
        const elements = await fetchOsmBusinesses(n, geo.lat, geo.lon);
        if(elements.length >= 3){
          const leads = osmToLeads(elements, n, l);
          setResults(leads); setDataSource('osm');
          setMeta({niche:n,location:l});
          setLoading(false);
          onResults && onResults(leads.length);
          return;
        }
      }
    }catch(e){}

    // 5 — Simulated fallback
    setScanMsg(`Generating demo leads for ${n} in ${l}...`);
    await new Promise(r=>setTimeout(r,900));
    const leads=generateLeads(n,l,12);
    setResults(leads); setDataSource('simulated');
    setMeta({niche:n,location:l});
    setLoading(false);
    onResults && onResults(leads.length);
  };

  const filtered=results.filter(l=>{
    if(filters.website==='no'&&l.hasWebsite) return false;
    if(filters.website==='yes'&&!l.hasWebsite) return false;
    if(filters.website==='weak'&&(l.score>50||!l.hasWebsite)) return false;
    if(filters.rating==='4+'&&(l.rating===null||l.rating<4)) return false;
    if(filters.phone&&!l.phone) return false;
    return true;
  });

  const loadMore = async () => {
    if(!apiKeys?.serper||!meta) return;
    setLoadingMore(true);
    const nextPage = serperPage + 1;
    try{
      const places = await fetchSerperLeads(meta.niche, meta.location, apiKeys.serper, nextPage);
      onSerperSearch && onSerperSearch();
      if(places.length > 0){
        const newLeads = serperToLeads(places, meta.niche, meta.location);
        setResults(prev=>[...prev, ...newLeads]);
        setSerperPage(nextPage);
        setHasMore(places.length >= 20);
        // Background enrich missing websites on new page
        if(apiKeys?.google){
          const missing = newLeads.filter(ld=>!ld.hasWebsite && !ld.hasFbOnly && (ld.cid||ld.placeId));
          if(missing.length){
            const enriched = await Promise.all(missing.map(ld=>enrichLeadWebsite(ld,apiKeys.google)));
            const enrichMap = new Map(enriched.map(ld=>[ld.id,ld]));
            setResults(prev=>prev.map(ld=>enrichMap.get(ld.id)||ld));
          }
        }
      } else {
        setHasMore(false);
      }
    }catch(e){ setHasMore(false); }
    setLoadingMore(false);
  };

  const handleSave=(lead,e)=>{
    e.stopPropagation();
    onSave(lead);
    setSavedIds(prev=>new Set([...prev,lead.id]));
  };

  return (
    <div>
      <div className="search-bar">
        <ComboInput mode="niche" value={niche} onChange={setNiche} placeholder="Niche — Plumbing, HVAC, Roofing..." onEnter={run}/>
        <div className="s-div"/>
        <ComboInput mode="location" value={loc} onChange={setLoc} placeholder="Anywhere in the world — city, country..." onEnter={run}/>
        <button className="s-btn" onClick={run} disabled={loading||!niche||!loc}>
          {loading?<span className="spinner" style={{borderTopColor:'var(--bg)'}}></span>:<><Ic n="bolt" s={13}/>Find Leads</>}
        </button>
      </div>

      <div className="filter-bar">
        <span className="filter-lbl">Filter</span>
        {[['any','Any Website'],['no','No Website'],['yes','Has Website'],['weak','Weak Site']].map(([v,l])=>(
          <button key={v} className={`chip${filters.website===v?' on':''}`} onClick={()=>setFilters(f=>({...f,website:v}))}>{l}</button>
        ))}
        <div style={{width:1,height:14,background:'var(--border)',margin:'0 2px'}}/>
        {[['any','Any Rating'],['4+','4★+']].map(([v,l])=>(
          <button key={v} className={`chip${filters.rating===v?' on':''}`} onClick={()=>setFilters(f=>({...f,rating:v}))}>{l}</button>
        ))}
        <button className={`chip${filters.phone?' on':''}`} onClick={()=>setFilters(f=>({...f,phone:!f.phone}))}>Has Phone</button>
      </div>

      {loading&&(
        <div className="scanning">
          <span className="ai-d dot1"></span><span className="ai-d dot2"></span><span className="ai-d dot3"></span>
          <span>{scanMsg || `Scanning ${niche} businesses in ${loc}...`}</span>
          <span style={{marginLeft:'auto',fontSize:11,opacity:.6}}>OpenStreetMap · Overpass API</span>
        </div>
      )}

      {meta&&!loading&&(
        <div className="results-bar">
          <Ic n="search" s={13}/>
          <span className="count">{filtered.length}</span> results — save the strongest ones
          {[...savedIds].filter(id=>results.find(r=>r.id===id)).length>0&&<><span style={{color:'var(--border2)'}}>·</span><span className="saved">{[...savedIds].filter(id=>results.find(r=>r.id===id)).length} saved</span></>}
          <span style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
            {dataSource==='serper' && <span style={{fontSize:10,fontWeight:700,background:'rgba(34,197,94,.12)',color:'var(--green)',border:'1px solid rgba(34,197,94,.25)',borderRadius:4,padding:'2px 7px'}}>● GOOGLE SEARCH</span>}
            {dataSource==='google' && <span style={{fontSize:10,fontWeight:700,background:'rgba(34,197,94,.12)',color:'var(--green)',border:'1px solid rgba(34,197,94,.25)',borderRadius:4,padding:'2px 7px'}}>● GOOGLE LIVE</span>}
            {dataSource==='osm'    && <span style={{fontSize:10,fontWeight:700,background:'rgba(59,130,246,.12)',color:'var(--blue)',border:'1px solid rgba(59,130,246,.25)',borderRadius:4,padding:'2px 7px'}}>● OPENSTREETMAP</span>}
            {dataSource==='simulated' && <span style={{fontSize:10,fontWeight:700,background:'var(--amberDim)',color:'var(--amber)',border:'1px solid rgba(240,160,32,.25)',borderRadius:4,padding:'2px 7px'}}>◌ DEMO DATA</span>}
            <span style={{fontSize:11,color:'var(--text3)'}}>{meta.niche} · {meta.location}</span>
          </span>
        </div>
      )}

      {dataSource==='simulated'&&filtered.length>0&&(
        <div style={{background:'rgba(240,160,32,.07)',border:'1px solid rgba(240,160,32,.2)',borderRadius:'var(--r)',padding:'12px 16px',marginBottom:14,fontSize:13,display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:20}}>⚠️</span>
          <div>
            <div style={{fontWeight:700,color:'var(--amber)',marginBottom:2}}>Demo data — not real businesses</div>
            <div style={{fontSize:12,color:'var(--text3)'}}>Add a <strong style={{color:'var(--text2)'}}>Serper.dev key</strong> in Settings to get real {meta?.niche} businesses with real names, phones, and websites in {meta?.location}. Free tier at serper.dev — no billing needed.</div>
          </div>
        </div>
      )}

      {filtered.length>0&&(
        <div className="leads-grid">
          {filtered.map(lead=>(
            <div key={lead.id} className="lcard" onClick={()=>onSelect(lead)}>
              <div className="lcard-head">
                <div style={{flex:1,marginRight:8}}>
                  <div className="lcard-name">{lead.name}</div>
                  {lead.realData && <span style={{fontSize:9,fontWeight:700,color:'var(--green)',letterSpacing:'.06em'}}>● REAL LISTING</span>}
                </div>
                <div className={`score-sm ${sc(lead.score)}`}>{lead.score}</div>
              </div>
              <div className="lcard-info">
                <Ic n="phone" s={11}/>
                {lead.phone
                  ? <a href={`tel:${lead.phone}`} style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)',textDecoration:'none'}} onClick={e=>e.stopPropagation()}>{lead.phone}</a>
                  : <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text3)'}}>No phone listed</span>}
                <span style={{color:'var(--border2)'}}>·</span>
                {lead.rating
                  ? <><span style={{color:'var(--amber)',fontSize:11}}><Ic n="star" s={10}/> {lead.rating}</span><span style={{color:'var(--text3)',fontSize:11}}>({lead.reviews})</span></>
                  : <span style={{color:'var(--text3)',fontSize:11}}>No rating data</span>}
              </div>
              <div className="lcard-info">
                {lead.hasWebsite
                  ? <a href={lead.website} target="_blank" rel="noreferrer" style={{fontSize:11}} onClick={e=>e.stopPropagation()}>{lead.website.replace(/^https?:\/\//,'').replace(/\/$/,'')}</a>
                  : lead.hasFbOnly ? <span className="fb-site">Facebook Only</span>
                  : lead.mapsUrl
                    ? <a href={lead.mapsUrl} target="_blank" rel="noreferrer" style={{fontSize:11,color:'var(--blue)',textDecoration:'none'}} onClick={e=>e.stopPropagation()}>📍 View on Google Maps</a>
                    : <span className="no-site">No Website</span>}
                {(()=>{
                  const sq = getSiteQuality(lead);
                  if(!sq) return null;
                  const colors = {
                    critical:{bg:'rgba(239,68,68,.13)',color:'var(--red)'},
                    warn:    {bg:'rgba(245,158,11,.13)',color:'var(--amber)'},
                    ok:      {bg:'rgba(34,197,94,.1)', color:'var(--green)'},
                    neutral: {bg:'rgba(148,163,184,.1)',color:'var(--text3)'},
                  };
                  const c = colors[sq.cls] || colors.neutral;
                  return (
                    <span title={sq.tip} style={{marginLeft:6,fontSize:10,fontWeight:600,padding:'1px 6px',borderRadius:4,background:c.bg,color:c.color,letterSpacing:'.02em'}}>
                      {sq.label}
                    </span>
                  );
                })()}
              </div>
              {lead.issues.length>0&&(
                <div className="issues-wrap">
                  <div className="issues-lbl">Issues detected</div>
                  {lead.issues.map(k=>(
                    <span key={k} className={`issue-tag ${ISSUE_TYPES[k]?.severity||'info'}`}>
                      {ISSUE_TYPES[k]?.severity==='critical'?'⚠ ':ISSUE_TYPES[k]?.severity==='warn'?'● ':'○ '}{ISSUE_TYPES[k]?.label}
                    </span>
                  ))}
                </div>
              )}
              <div className="lcard-foot" onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:11,color:'var(--text3)'}}>Est. <span style={{color:'var(--amber)',fontWeight:700,fontFamily:'var(--mono)'}}>${lead.monthlyValue}/mo</span></div>
                <button className={`save-btn${savedIds.has(lead.id)?' saved':''}`} onClick={e=>handleSave(lead,e)}>
                  {savedIds.has(lead.id)?<><Ic n="check" s={11}/>Saved</>:<><Ic n="save" s={11}/>Save Lead</>}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {dataSource==='serper' && !loading && results.length>0 && (
        <div style={{display:'flex',justifyContent:'center',padding:'16px 0'}}>
          {hasMore ? (
            <button className="btn btn-primary" onClick={loadMore} disabled={loadingMore} style={{minWidth:180}}>
              {loadingMore
                ? <><span className="spinner" style={{borderTopColor:'var(--bg)',borderColor:'rgba(0,0,0,.2)'}}/>Loading page {serperPage+1}...</>
                : <><Ic n="search" s={13}/>Load More Results (page {serperPage+1})</>}
            </button>
          ) : (
            <span style={{fontSize:12,color:'var(--text3)'}}>All results loaded — {results.length} businesses found</span>
          )}
        </div>
      )}

      {!loading&&results.length===0&&(
        <div className="empty" style={{marginTop:50}}>
          <div className="empty-icon">🏢</div>
          <div className="empty-title">Search for local businesses</div>
          <div className="empty-sub">Enter a niche and location to discover businesses<br/>with weak or missing websites — your easiest closes.</div>
        </div>
      )}
    </div>
  );
}

/* ── TRACKER (KANBAN) ────────────────────────────────────── */
function Tracker({leads,onStatus,onSelect,apiKeys}){
  const cols=[
    {id:'new',        label:'New',        color:'var(--text2)'},
    {id:'called',     label:'Called',     color:'var(--blue)'},
    {id:'interested', label:'Interested', color:'var(--amber)'},
    {id:'followup',   label:'Follow Up',  color:'var(--yellow)'},
    {id:'closed',     label:'Closed',     color:'var(--green)'},
  ];

  const [dragId,   setDragId]   = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [aiLead,   setAiLead]   = useState(null);
  const [msgs,     setMsgs]     = useState([]);
  const [input,    setInput]    = useState('');
  const [aiLoading,setAiLoading]= useState(false);
  const msgsEnd = useRef(null);

  useEffect(()=>{ msgsEnd.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  const QUICK = [
    {label:'Opening lines',        msg:'Give me the exact opening lines to say when they pick up. I\'m calling right now.'},
    {label:'Book the zoom',        msg:'What\'s the exact line to get them to agree to a zoom call to see the free site I built them?'},
    {label:'They said not interested', msg:'They said not interested. How do I respond to keep them on the line?'},
    {label:'Already have a website',msg:'They said they already have a website. What do I say?'},
    {label:'Follow-up text now',   msg:'Write me a short text message to send them right now.'},
    {label:'Zoom call opener',     msg:'They joined the zoom. I\'m about to screen-share the demo site. What do I say first?'},
    {label:'Handle price objection',msg:'They said $197/month is too expensive. How do I handle this with the math?'},
    {label:'Close on zoom',        msg:'They like the site but haven\'t committed. What\'s the exact line to close this right now?'},
  ];

  const openAI = lead => {
    setAiLead(lead);
    const col = cols.find(c=>c.id===lead.status);
    setMsgs([{role:'assistant', content:`on **${lead.name}** — ${lead.niche}, currently in **${col?.label||lead.status}**. score ${lead.score}/100.\n\nwhat do you need? pick a quick action or ask me anything.`}]);
    setInput('');
  };

  const closeAI = () => { setAiLead(null); setMsgs([]); setInput(''); };

  const send = async text => {
    if(!text.trim()||aiLoading||!aiLead) return;
    const um = {role:'user',content:text};
    setMsgs(m=>[...m,um]);
    setInput('');
    setAiLoading(true);
    const cfg = getNiche(aiLead.niche);
    const ws  = aiLead.hasWebsite?'weak/slow website':aiLead.hasFbOnly?'Facebook page only':'no website at all';
    const issueList = (aiLead.issues||[]).map(k=>ISSUE_TYPES[k]?.label||k).join(', ')||'weak online presence';
    const history = [...msgs,um].map(m=>`${m.role==='user'?'Rep':'Coach'}: ${m.content}`).join('\n');
    const prompt = `You are an expert cold calling coach for a web design agency. The model: build a free demo site for the business before calling, cold call saying you're a "web design student who built them a free site as practice", goal of the call is ONLY to book a zoom — never sell on the call. On zoom, screen-share the demo site immediately and close a $97-297/month retainer.

Rep is working this lead:
Business: ${aiLead.name}
Niche: ${aiLead.niche}
Pipeline stage: ${aiLead.status}
Website: ${ws}
Issues: ${issueList}
Score: ${aiLead.score}/100
Phone: ${aiLead.phone||'not listed'}
Monthly retainer: $${aiLead.monthlyValue}/mo
Their avg job: ${cfg.priceRange} — ROI: ${cfg.math}

Rules: cold call = book zoom only. On zoom = screen share site, then pitch retainer with math. Follow up 5-11 times.
Keep responses SHORT (2-4 sentences). Word-for-word when asked. Lowercase, direct, no fluff.

${history}
Coach:`;
    try{
      const reply = await llmComplete(prompt);
      setMsgs(m=>[...m,{role:'assistant',content:reply}]);
    }catch(e){
      setMsgs(m=>[...m,{role:'assistant',content:e.message==='no-key'?'add an openrouter or groq key in settings to use the ai coach.':'something went wrong. try again.'}]);
    }
    setAiLoading(false);
  };

  const dragStart = (e,id) => { setDragId(id); e.dataTransfer.effectAllowed='move'; };
  const dragOver_ = (e,id) => { e.preventDefault(); setDragOver(id); };
  const drop      = (e,id) => { e.preventDefault(); if(dragId) onStatus(dragId,id); setDragId(null); setDragOver(null); };
  const dragEnd   = ()     => { setDragId(null); setDragOver(null); };

  if(!leads.length) return(
    <div className="empty" style={{marginTop:80}}>
      <div className="empty-icon">📋</div>
      <div className="empty-title">Tracker is empty</div>
      <div className="empty-sub">Save leads from the Lead Search and they'll appear here<br/>for outreach tracking.</div>
    </div>
  );

  return(
    <div style={{position:'relative'}}>
      <div className="kanban" style={{transition:'padding .22s',paddingRight:aiLead?372:0}}>
        {cols.map(col=>{
          const cl=leads.filter(l=>l.status===col.id);
          return(
            <div key={col.id} className="k-col">
              <div className="k-col-head">
                <div className="k-col-title" style={{color:col.color}}>{col.label}</div>
                <div className="k-count">{cl.length}</div>
              </div>
              <div
                className={`k-col-body${dragOver===col.id?' drag-over':''}`}
                onDragOver={e=>dragOver_(e,col.id)}
                onDrop={e=>drop(e,col.id)}
                onDragLeave={()=>setDragOver(null)}
              >
                {cl.map(l=>(
                  <div
                    key={l.id}
                    className={`k-card${dragId===l.id?' dragging':''}`}
                    draggable
                    onDragStart={e=>dragStart(e,l.id)}
                    onDragEnd={dragEnd}
                    onClick={()=>openAI(l)}
                  >
                    <div className="k-card-name">
                      <span style={{fontSize:12.5,fontWeight:700,flex:1,lineHeight:1.3}}>{l.name}</span>
                      <span className={`score-sm ${sc(l.score)}`}>{l.score}</span>
                    </div>
                    <div className="k-card-phone">{l.phone||<span style={{opacity:.5}}>no phone</span>}</div>
                    <div style={{display:'flex',alignItems:'center',gap:5,marginTop:7}} onClick={e=>e.stopPropagation()}>
                      <select className="k-status-sel" style={{flex:1,marginTop:0}} value={l.status} onChange={e=>onStatus(l.id,e.target.value)}>
                        {cols.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                      </select>
                      <button
                        style={{fontSize:10,padding:'4px 8px',background:'rgba(240,160,32,.1)',border:'1px solid rgba(240,160,32,.2)',borderRadius:4,color:'var(--amber)',cursor:'pointer',whiteSpace:'nowrap',lineHeight:1.4}}
                        onClick={e=>{e.stopPropagation();onSelect(l);}}
                      >Details</button>
                    </div>
                  </div>
                ))}
                {cl.length===0&&<div style={{textAlign:'center',padding:'20px 0',color:'var(--text3)',fontSize:11,border:'1.5px dashed var(--border)',borderRadius:'var(--rsm)',margin:'4px 0'}}>drop here</div>}
              </div>
            </div>
          );
        })}
      </div>

      {/* AI Coach Drawer */}
      <div className={`ai-drawer${aiLead?' open':''}`}>
        {aiLead ? <>
          <div className="ai-drawer-head">
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{aiLead.name}</div>
              <div style={{fontSize:11,color:'var(--text3)'}}>
                {aiLead.niche} · <span style={{color:cols.find(c=>c.id===aiLead.status)?.color}}>{cols.find(c=>c.id===aiLead.status)?.label}</span> · score {aiLead.score}
              </div>
            </div>
            <button style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:20,padding:'0 2px',lineHeight:1,marginLeft:8}} onClick={closeAI}>×</button>
          </div>

          <div style={{padding:'9px 12px',borderBottom:'1px solid var(--border)',display:'flex',flexWrap:'wrap',gap:5,flexShrink:0}}>
            {QUICK.map(a=>(
              <button key={a.label} onClick={()=>send(a.msg)} disabled={aiLoading}
                style={{fontSize:10.5,padding:'4px 9px',background:'var(--s2)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text2)',cursor:'pointer',transition:'all .1s'}}
                onMouseOver={e=>e.currentTarget.style.borderColor='var(--amber)'}
                onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}
              >{a.label}</button>
            ))}
          </div>

          <div className="ai-msgs">
            {msgs.map((m,i)=>(
              <div key={i} className={`ai-bubble ${m.role}`}>{m.content}</div>
            ))}
            {aiLoading&&(
              <div className="ai-bubble assistant" style={{padding:'12px 16px'}}>
                <span className="ai-d dot1"></span><span className="ai-d dot2"></span><span className="ai-d dot3"></span>
              </div>
            )}
            <div ref={msgsEnd}/>
          </div>

          <div className="ai-input-row">
            <input
              className="field-input"
              style={{flex:1,fontSize:12,padding:'8px 11px'}}
              placeholder="Ask the AI coach anything..."
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send(input)}
              disabled={aiLoading}
            />
            <button className="s-btn" style={{padding:'0 14px',borderRadius:'var(--r)',fontSize:12,flexShrink:0}} onClick={()=>send(input)} disabled={aiLoading||!input.trim()}>
              <Ic n="bolt" s={12}/>
            </button>
          </div>
        </> : (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:10,padding:24,textAlign:'center'}}>
            <span style={{fontSize:32}}>🤖</span>
            <span style={{fontSize:13,color:'var(--text3)',lineHeight:1.5}}>Click any lead card to open the AI coach</span>
            <span style={{fontSize:11,color:'var(--text3)',opacity:.7}}>Get word-for-word scripts, objection handling, and next steps personalized to each lead</span>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── SETTINGS ────────────────────────────────────────────── */
function Settings({apiKeys,serperUsage,onSave}){
  const [keys,setKeys]=useState(apiKeys);
  const [saved,setSaved]=useState(false);
  const doSave=()=>{onSave(keys);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  return(
    <div style={{maxWidth:660}}>
      <div className="settings-block">
        <div className="settings-title">API Keys</div>
        <div className="settings-sub">Connect AI providers to power lead analysis and script generation. Keys are stored locally — never sent to our servers.</div>
        {[
          {key:'serper',    label:'Serper.dev (Recommended)', ph:'...', hint:'serper.dev → Sign up free → Dashboard → API Key. Scrapes real Google local results — real business names, phones, websites. Free tier: 2,500 searches, no credit card needed.', usage:true},
          {key:'google',    label:'Google Places API', ph:'AIza...',      hint:'console.cloud.google.com → Enable "Places API (New)" → Create API key. Alternative to Serper — requires billing enabled.'},
          {key:'openrouter',label:'OpenRouter',         ph:'sk-or-v1-...', hint:'openrouter.ai — access Claude, GPT-4, Llama & more for AI analysis and script generation'},
          {key:'groq',      label:'Groq',               ph:'gsk_...',      hint:'console.groq.com — ultra-fast inference for real-time lead scoring'},
        ].map(f=>(
          <div key={f.key} className="field">
            <div className="field-label">
              <Ic n="key" s={12}/>{f.label}
              <span className={`api-status ${keys[f.key]?'on':'off'}`}>{keys[f.key]?'Connected':'Not set'}</span>
            </div>
            <input className="field-input" type="password" placeholder={f.ph} value={keys[f.key]} onChange={e=>setKeys(k=>({...k,[f.key]:e.target.value}))}/>
            <div className="field-hint">{f.hint}</div>
            {f.usage && keys[f.key] && (()=>{
              const used = serperUsage||0;
              const total = 2500;
              const pct = Math.min(100, Math.round(used/total*100));
              const left = total - used;
              const color = pct>80?'var(--red)':pct>50?'var(--amber)':'var(--green)';
              return (
                <div style={{marginTop:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
                    <span style={{color:'var(--text3)'}}>Free tier usage</span>
                    <span style={{fontWeight:700,color}}>{used.toLocaleString()} / {total.toLocaleString()} searches used — <span style={{color:'var(--green)'}}>{left.toLocaleString()} left</span></span>
                  </div>
                  <div style={{height:5,borderRadius:3,background:'var(--border)',overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${pct}%`,background:color,borderRadius:3,transition:'width .4s'}}/>
                  </div>
                </div>
              );
            })()}
          </div>
        ))}
        <button className="btn btn-primary" onClick={doSave}>
          {saved?<><Ic n="check" s={14}/>Saved</>:<><Ic n="save" s={14}/>Save Keys</>}
