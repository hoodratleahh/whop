/* ── SCRIPT GENERATOR ────────────────────────────────────── */
function ScriptGen({savedLeads,onGen,onDone}){
  const [selId,setSelId]=useState('');
  const [manual,setManual]=useState(false);
  const [man,setMan]=useState({name:'',niche:'',issues:'',website:'none',phone:''});
  const [script,setScript]=useState(null);
  const [loading,setLoading]=useState(false);
  const [tab,setTab]=useState('call');
  const [copied,setCopied]=useState('');

  const lead=manual?{
    name:man.name||'the business',niche:man.niche||'service business',
    issues:man.issues?man.issues.split(',').map(s=>s.trim()):[],
    hasWebsite:man.website==='weak',hasFbOnly:man.website==='facebook',
    phone:man.phone,score:80,monthlyValue:297,damages:[],
  }:savedLeads.find(l=>l.id===selId);

  const gen=async()=>{
    if(!lead) return;
    setLoading(true);setScript(null);
    onGen && onGen();
    const cfg=getNiche(lead.niche);
    const ws=lead.hasWebsite?'weak/slow website':lead.hasFbOnly?'Facebook page only':'no website at all';
    const issueList=lead.issues?.length?lead.issues.map(k=>ISSUE_TYPES[k]?.label||k).join(', '):man.issues||'weak online presence';
    const city = (lead.location||'').split(',')[0]||'their area';
    // Pull real site audit data if available
    const audit = lead.audit || {};
    const siteDetails = audit.perf!=null
      ? `performance score ${audit.perf}/100, mobile ${audit.mobile}/100, FCP ${audit.fcp}s, LCP ${audit.lcp}s${audit.ssl===false?' — NO SSL (http only)':''}`
      : null;
    const whoisDetail = audit.expiry ? `domain expires ${audit.expiry}` : null;

    const prompt=`You are an expert cold calling coach for a web design agency. Generate a personalized script using the EXACT framework below. Tone: lowercase, casual, authentic — sound like a real person texting a friend, not reading a script.

BUSINESS MODEL:
Build a free demo website before calling. Cold call using Julie Becker warm referral intro. Walk through problem + skepticism + math on the call — but the ASK is only to book a zoom to "show them the site." Never pitch price on the cold call. On zoom, screen-share the demo site and close $97-297/month retainer. Monthly package: website, domain, hosting, AI live chat, contact form, Google reviews widget, SEO.

LEAD DATA:
- Business: ${lead.name}
- Niche: ${lead.niche}
- Website situation: ${ws}
- Specific Issues: ${issueList}
- Their avg job value: ${cfg.priceRange}
- ROI math: ${cfg.math}
- Monthly retainer: $${lead.monthlyValue}/mo
- Phone: ${lead.phone||'not listed'}
- City: ${(lead.location||'').split(',')[0]||''}
- Reviews: ${lead.reviews!=null?`${lead.reviews} reviews, ${lead.rating||'?'} stars`:'no review data'}
${siteDetails?`- Live site audit: ${siteDetails}`:''}
${whoisDetail?`- WHOIS: ${whoisDetail}`:''}

THE REAL PROBLEM THEY FACE (use this throughout the script):
${issueList === 'weak online presence'
  ? 'They have no way for customers to find them online — no website, no Google presence, no way to capture leads that Google them.'
  : issueList.includes('No Website')
  ? 'They have zero web presence. People search for them, find competitors instead. No way to collect leads 24/7.'
  : issueList.includes('Slow Load')
  ? `Their site is painfully slow (${siteDetails||'too many requests, slow FCP/LCP'}). Customers get frustrated and click away. They're losing 40%+ of visitors.`
  : issueList.includes('Low Mobile')
  ? 'Their site doesn\'t work on phones. 60%+ of searches are mobile. Customers can\'t reach them.'
  : issueList.includes('No Reviews')
  ? 'Zero Google reviews. New customers have no social proof. Trust factor is zero. Competitors with reviews steal their calls.'
  : `Issue: ${issueList}. This directly costs them ${cfg.outcome} every single day.`}

CRITICAL: Every script section should REFERENCE their specific issue above — not generic "you need a website" copy. Make them feel like you understand their exact problem, not pitching a generic solution.

FRAMEWORK: Julie Becker referral opener → problem ID (their specific issue) → disarm skepticism ("look i get it") → pitch outcome not service (how this solves their specific problem) → show ROI math → "i already built it free, just 10 min to show you" → lock zoom with 2 specific times. GOAL OF COLD CALL = zoom booking only.

Generate each section with its EXACT label in brackets. Lowercase throughout. Specific to ${lead.name}.

[COLD CALL OPENING]
Two parts: (1) Julie Becker referral — "hey is this ${lead.name}? what's up, my mom's friend julie becker referred me to you guys. she said you do ${lead.niche}, right?" (2) Immediately after they confirm — reference their SPECIFIC situation. Not generic. Examples: "actually — julie mentioned you're still getting a lot of calls even without a good online presence. i thought that was interesting so i went ahead and built you a free site to see what could happen if people could actually find you online." Or: "julie mentioned your site's been a bit slow. i actually built you a faster version for free just to see how much traffic you could capture if people didn't bounce." 3-4 lines, natural.

[PROBLEM ID]
Reference their SPECIFIC issue from above. Not generic. If they have no website, say that. If slow site, mention slow loading. If no reviews, say customers can't find social proof. This should feel like you already know their exact problem — because you do. Acknowledge reality, not blame. 2 lines.
Example: "julie mentioned you don't have a ton of online presence — which is actually pretty common for ${lead.niche}. but here's the thing — most of your customers probably search for you before calling."

[ACKNOWLEDGE SKEPTICISM]
"look, i get it — you probably don't care about websites, right? you care about ${cfg.outcome}." One line. Disarms them completely.

[THE PITCH]
Connect their specific issue → lost ${cfg.outcome} → why this matters now. Example: "every day your site is slow, people bounce. every day you have no reviews, new customers call competitors. this is literally costing you ${cfg.outcome} right now." 2-3 sentences. Make it FEEL real and specific to their problem, not generic.

[THE MATH]
"you probably charge ${cfg.priceRange} per ${cfg.jobWord||'job'}. ${cfg.math}. so even one extra ${cfg.jobWord||'job'} and you're way ahead." Make it stupid obvious. 2 sentences.

[THE OFFER + GET THE ZOOM]
"here's the thing — i already built it. it's completely free. i just want to jump on for 10 minutes and show you what it looks like. if you don't like it, zero obligation, you owe me nothing." Then lock it: "so when works — [specific day + time] or [specific day + time]?" Two options only.

[OBJECTION: NOT INTERESTED / WHY ARE YOU CALLING]
Keep it super low stakes and reference their specific problem: "totally fair — look, the reason i'm calling is because of the ${issueList} thing. i just built something that solves that specific issue. costs you nothing to look at. if you hate it just tell me and that's the end of it. takes 10 minutes max." 1-2 lines.

[OBJECTION: ALREADY HAVE A WEBSITE]
${siteDetails?`Their site scored ${siteDetails}. Use this: "yeah — that's actually the issue i'm talking about. your site scored ${siteDetails}. this one's built specifically to fix that." `:`Don't argue — "yeah nice, mine's built to specifically solve the ${issueList} problem you mentioned. honestly i'd just love your feedback on it — takes like 10 minutes. if it's worse than yours just tell me."`}Reframe as asking for their opinion on solving their specific problem, not selling.

[OBJECTION: WE'RE TOO BUSY / ALREADY BUSY]
"perfect, that means you already have demand — this just captures the ones you're losing that never even reach out. 10 minutes whenever you have a gap." 1 line.

[OBJECTION: HOW MUCH DOES IT COST]
Don't answer with price yet — "let me just show you first, and if you want to move forward we can talk about that. it's pretty flexible. when are you free?" Deflect to the zoom.

[OBJECTION: CALL ME BACK LATER]
"easier to just lock it in now so neither of us forget. how's [specific time] today or [specific time] tomorrow?" Don't let them escape.

[OBJECTION: WE'LL THINK ABOUT IT]
"totally. i'll send you a quick look at the site right now so you can see what we're talking about. take a look and if it makes sense we can do 10 minutes." Send immediately.

[ZOOM CONFIRMATION TEXT]
Text to send within 30 seconds of hanging up. Casual, mention you're sending the site preview. 1-2 sentences.

[DAY 1 FOLLOW UP]
12 hours after. Reference what you sent and their specific issue. 1 sentence, no pressure.
Example: "just sent you the site preview — shows what happens when people can actually find you online instead of your competitors."

[DAY 2 FOLLOW UP]
24 hours. Reference their specific issue (${issueList}). Why it matters to ${lead.niche} right now. 1 sentence.
Example: "every competitor with reviews is getting the calls you're missing right now."

[DAY 3 CALL BACK]
Script for calling them back on day 3. Open naturally, reference the site and their specific problem. Make it feel like a real follow-up, not a cold call. 2-3 lines.

[DAY 5 FOLLOW UP]
New angle — tie their specific issue directly to lost ${cfg.outcome} and ROI. Don't be generic.
Example: "a ${lead.niche} who doesn't show up on Google is literally leaving money on the table. you're losing jobs to people who have a site."

[DAY 7 FOLLOW UP]
Last structured touch. Keep door open. 1 sentence.

[ZOOM CALL OPENING]
They joined. Screen share the demo site immediately. "so i went ahead and put this together for you — it's got your name, your services, your phone number right there. it actually looks professional. watch what happens when someone in ${city} searches for [their niche] — this would show up." Let the site talk. Then: "the biggest difference is people can now actually FIND you, and when they land, there's a form they fill out so you get leads 24/7. way different from [reference their issue: slow site/no reviews/invisible]." 2-3 sentences then stop and let them react.

[ZOOM PITCH]
After they react positively. Now close: "so here's what i do — i get this live for you with a real domain, hosting, the whole thing. you get live chat, a contact form, Google reviews pull-in, SEO setup. basically everything that solves the ${issueList} problem you have. it's $${lead.monthlyValue} a month. ${cfg.math}. want me to get this set up for you today?" 3-4 sentences. Make it feel like you're solving their specific problem, not selling a generic service.

[ZOOM OBJECTION: TOO EXPENSIVE]
One-liner with their math: "you charge ${cfg.priceRange} per ${cfg.jobWord||'job'} — if this brings you one extra ${cfg.jobWord||'job'} this year you're already 5-10x your money back. it's basically free if it works."

[ZOOM OBJECTION: NEED TO THINK ABOUT IT]
"totally — what's the main thing holding you back? i just want to make sure i answer it before you go." Pull out the real objection. Don't let them ghost.

[ZOOM OBJECTION: ALREADY HAVE A WEBSITE]
${siteDetails?`Reference their audit: it scored ${siteDetails}. `:''}Compare directly: "yours does [X], this one does [Y + contact form + live chat + reviews + SEO]. different tool, different result." 1-2 lines.

[ZOOM CLOSE]
They're warm. Push to done: "here's what i'll do — i'll get this live for you today. i just need your [domain preference / basic info]. we can literally have it up before end of day." Make it feel already done.

Lowercase throughout. Specific to ${lead.name} and ${lead.niche}. No generic filler.`;

    try{
      const text=await llmComplete(prompt);
      const keys=['COLD CALL OPENING','PROBLEM ID','ACKNOWLEDGE SKEPTICISM','THE PITCH','THE MATH','THE OFFER + GET THE ZOOM','OBJECTION: NOT INTERESTED / WHY ARE YOU CALLING','OBJECTION: ALREADY HAVE A WEBSITE','OBJECTION: WE\'RE TOO BUSY / ALREADY BUSY','OBJECTION: HOW MUCH DOES IT COST','OBJECTION: CALL ME BACK LATER','OBJECTION: WE\'LL THINK ABOUT IT','ZOOM CONFIRMATION TEXT','DAY 1 FOLLOW UP','DAY 2 FOLLOW UP','DAY 3 CALL BACK','DAY 5 FOLLOW UP','DAY 7 FOLLOW UP','ZOOM CALL OPENING','ZOOM PITCH','ZOOM OBJECTION: TOO EXPENSIVE','ZOOM OBJECTION: NEED TO THINK ABOUT IT','ZOOM OBJECTION: ALREADY HAVE A WEBSITE','ZOOM CLOSE'];
      const sections={};
      keys.forEach((k,i)=>{
        const start=text.indexOf(`[${k}]`);
        if(start===-1) return;
        const next=keys[i+1];
        const end=next?text.indexOf(`[${next}]`):text.length;
        sections[k]=text.slice(start+k.length+2,end===-1?text.length:end).trim();
      });
      setScript({sections,lead,cfg});
      onDone && onDone();
    }catch(e){
      setScript({error: e.message==='no-key' ? {noKey:true} : {msg:e.message}, lead, cfg});
    }
    setLoading(false);
  };

  const copy=(text,key)=>{
    navigator.clipboard.writeText(text).then(()=>{setCopied(key);setTimeout(()=>setCopied(''),1500);});
  };

  const CALL_STEPS=[
    {key:'COLD CALL OPENING',       n:1, label:'Opening',              hint:'Julie Becker referral + "i already built you a free site" — fused'},
    {key:'PROBLEM ID',              n:2, label:'Problem ID',           hint:'Get them to name the gap — they agree or they don\'t, either way you\'re talking'},
    {key:'ACKNOWLEDGE SKEPTICISM',  n:3, label:'Disarm Skepticism',    hint:'"look i get it — you don\'t care about websites, you care about [outcome]"'},
    {key:'THE PITCH',               n:4, label:'The Pitch',            hint:'Outcome not service — losing jobs/orders to competitors who show up on Google'},
    {key:'THE MATH',                n:5, label:'The Math',             hint:'1 extra job = 5-10x ROI — kill the price objection before they know the price'},
    {key:'THE OFFER + GET THE ZOOM',n:6, label:'Offer + Lock the Zoom',hint:'"i already built it, it\'s free, just 10 minutes" — two times, that\'s it'},
  ];
  const OBJ_STEPS=[
    {key:'OBJECTION: NOT INTERESTED / WHY ARE YOU CALLING', label:'"Not interested / why are you calling?"'},
    {key:'OBJECTION: ALREADY HAVE A WEBSITE',               label:'"We already have a website"'},
    {key:"OBJECTION: WE'RE TOO BUSY / ALREADY BUSY",        label:'"We\'re already busy"'},
    {key:'OBJECTION: HOW MUCH DOES IT COST',                label:'"How much does it cost?"'},
    {key:'OBJECTION: CALL ME BACK LATER',                   label:'"Call me back later"'},
    {key:"OBJECTION: WE'LL THINK ABOUT IT",                 label:'"We\'ll think about it"'},
  ];
  const FU_STEPS=[
    {key:'ZOOM CONFIRMATION TEXT', label:'Immediately — send within 30 sec of hanging up'},
    {key:'DAY 1 FOLLOW UP',        label:'Day 1 — 12 hours later'},
    {key:'DAY 2 FOLLOW UP',        label:'Day 2 — 24 hours later'},
    {key:'DAY 3 CALL BACK',        label:'Day 3 — call them back'},
    {key:'DAY 5 FOLLOW UP',        label:'Day 5 — new angle'},
    {key:'DAY 7 FOLLOW UP',        label:'Day 7 — last structured touch'},
  ];
  const ZOOM_STEPS=[
    {key:'ZOOM CALL OPENING',                     n:1, label:'Open with Demo Site',      hint:'Screen share immediately — their name, services, phone on screen. Let it talk.'},
    {key:'ZOOM PITCH',                            n:2, label:'Pitch the Retainer',       hint:'$97-297/mo: site + domain + hosting + live chat + contact form + reviews + SEO'},
    {key:'ZOOM OBJECTION: TOO EXPENSIVE',         n:3, label:'"Too expensive"',          hint:'1 extra job = already paid for itself 5-10x'},
    {key:'ZOOM OBJECTION: NEED TO THINK ABOUT IT',n:4, label:'"Need to think about it"', hint:'Pull out the real objection — don\'t let them disappear'},
    {key:'ZOOM OBJECTION: ALREADY HAVE A WEBSITE',n:5, label:'"Already have a website"', hint:'Compare directly — does theirs have live chat, booking, reviews widget?'},
    {key:'ZOOM CLOSE',                            n:6, label:'Close',                   hint:'"i\'ll get this live for you today — just need your domain" — make it feel done'},
  ];

  return(
    <div style={{display:'flex',gap:18,height:'calc(100vh - 140px)',overflow:'hidden'}}>
      {/* LEFT */}
      <div style={{width:270,flexShrink:0,display:'flex',flexDirection:'column',gap:10,overflowY:'auto'}}>
        <div className="settings-block" style={{padding:16}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Select Lead</div>
          <div style={{display:'flex',gap:6,marginBottom:12}}>
            <button className={`chip${!manual?' on':''}`} style={{flex:1,textAlign:'center'}} onClick={()=>setManual(false)}>Saved Lead</button>
            <button className={`chip${manual?' on':''}`} style={{flex:1,textAlign:'center'}} onClick={()=>setManual(true)}>Manual</button>
          </div>
          {!manual?(
            savedLeads.length===0?(
              <div style={{fontSize:12,color:'var(--text3)',lineHeight:1.6}}>No saved leads. Run a search and save leads first.</div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {savedLeads.map(l=>(
                  <div key={l.id} onClick={()=>setSelId(l.id)}
                    style={{padding:'10px 12px',borderRadius:6,cursor:'pointer',border:'1px solid',transition:'all .12s',
                      borderColor:selId===l.id?'rgba(240,160,32,.4)':'var(--border)',
                      background:selId===l.id?'var(--amberDim)':'var(--s1)'}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3}}>

          ):(
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {[['name','Business Name',"Mike's Plumbing"],['niche','Niche','Plumbing'],['phone','Phone','+1 555 234 5678'],['issues','Issues (comma-sep)','No website, Slow load']].map(([f,l,ph])=>(

/* ── WEBSITE AUDIT APIS (free, no key) ──────────────────── */
async function runPageSpeed(url){
  try{
    const clean = url.startsWith('http') ? url : 'https://'+url;
    const res = await fetch(`https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(clean)}&strategy=mobile&category=performance`);
    if(!res.ok) return null;
    const d = await res.json();
    const lr = d.lighthouseResult;
    if(!lr) return null;
    const perf  = Math.round((lr.categories?.performance?.score||0)*100);
    const fcp   = lr.audits?.['first-contentful-paint']?.displayValue||null;
    const lcp   = lr.audits?.['largest-contentful-paint']?.displayValue||null;
    const mobile= lr.audits?.['viewport']?.score===1;
    const ssl   = clean.startsWith('https');
    return {perf, fcp, lcp, mobile, ssl};
  }catch(e){return null;}
}

async function runWhois(url){
  try{
    const domain = url.replace(/^https?:\/\//,'').replace(/\/.*/,'').replace(/^www\./,'');
    const res = await fetch(`https://who-dat.as93.net/${domain}`);
    if(!res.ok) return null;
    const d = await res.json();
    const exp = d?.domain?.expiration_date||d?.registrant?.expiration_date||null;
    const created = d?.domain?.creation_date||null;
    const registrar = d?.registrar?.name||null;
    return {domain, exp, created, registrar};
  }catch(e){return null;}
}

async function fetchLeadWebsite(url){
  if(!url) return null;
  const clean = url.startsWith('http') ? url : 'https://'+url;
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(clean)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(clean)}`,
  ];
  for(const p of proxies){
    try{
      const res = await fetch(p, {signal:AbortSignal.timeout(7000)});
      if(!res.ok) continue;
      const text = p.includes('allorigins') ? (await res.json()).contents : await res.text();
      if(text && text.length > 200) return text;
    }catch(e){ continue; }
  }
  return null;
}

function extractSiteContent(html){
  if(!html) return '';
  try{
    const doc = new DOMParser().parseFromString(html,'text/html');
    ['script','style','nav','footer','iframe','noscript'].forEach(t=>
      doc.querySelectorAll(t).forEach(el=>el.remove()));
    const title = doc.title || '';
    const meta  = doc.querySelector('meta[name="description"]')?.content || '';
    const h1s   = [...doc.querySelectorAll('h1,h2,h3')].map(h=>h.textContent.trim()).filter(Boolean).slice(0,10).join(' | ');
    const body  = (doc.body?.innerText||'').replace(/\s+/g,' ').substring(0,1800);
    return `Page title: ${title}\nMeta: ${meta}\nHeadings: ${h1s}\nBody: ${body}`.substring(0,2400);
  }catch(e){ return ''; }
}

function extractImages(rawHtml, siteUrl){
  if(!rawHtml || !siteUrl) return [];
  try{
    const base = new URL(siteUrl.startsWith('http') ? siteUrl : 'https://'+siteUrl);
    const doc  = new DOMParser().parseFromString(rawHtml,'text/html');
    const seen = new Set();

    /* Score each image — higher = more likely a real content photo */
    const scored = [...doc.querySelectorAll('img[src]')].map(img=>{
      try{
        const src = img.getAttribute('src')||'';
        if(!src || src.startsWith('data:')) return null;
        const abs = new URL(src, base.href).href;
        if(seen.has(abs)) return null;
        seen.add(abs);
        const lo = abs.toLowerCase();

        /* Hard excludes */
        if(/\.(svg|gif|ico)(\?|$)/i.test(lo)) return null;
        if(/logo|icon|favicon|sprite|pixel|tracking|1x1|blank|placeholder|avatar|badge|star|rating|arrow|btn|button|social|fb|twitter|instagram|yelp|bbb|seal|cert/i.test(lo)) return null;

        /* Size filter — skip obvious thumbnails / icons */
        const w = parseInt(img.getAttribute('width')||img.width||0);
        const h = parseInt(img.getAttribute('height')||img.height||0);
        if(w>0 && w<150) return null;
        if(h>0 && h<100) return null;

        /* Score: prefer content area images, larger declared sizes, meaningful alt text */
        let score = 50;
        const inContent = img.closest('main,article,section,.content,.body,.page,#content,#main');
        const inNav     = img.closest('header,nav,footer,.nav,.header,.footer,.menu');
        if(inContent) score += 40;
        if(inNav)     score -= 60;
        if(w > 400)   score += 20;
        if(w > 800)   score += 20;
        if(img.alt && img.alt.length > 4) score += 15;
        /* URL signals for real photos */
        if(/photo|image|img|pic|work|project|service|team|fleet|truck|van|staff|job|before|after|gallery/i.test(lo)) score += 25;
        if(/uploads|media|assets|content|wp-content/i.test(lo)) score += 15;

        return {src:abs, alt:img.alt||img.title||'', score};
      }catch(e){ return null; }
    }).filter(Boolean);

    return scored
      .sort((a,b)=>b.score-a.score)
      .slice(0,8)
      .map(({src,alt})=>({src,alt}));
  }catch(e){ return []; }
}


/* ─ Extract dominant brand color from scraped HTML ─ */
function extractBrandColors(html){
  if(!html) return null;
  try{
    const doc = new DOMParser().parseFromString(html,'text/html');
    const cssText = [...doc.querySelectorAll('style')].map(s=>s.textContent).join('\n');

    /* 1 — CSS custom properties named like --primary / --brand / --accent / --color */
    const propRx = /--(?:primary|brand|accent|color|main|theme)[^:]*\s*:\s*(#[0-9a-fA-F]{3,6})/gi;
    const propHits = [];
    let m;
    while((m=propRx.exec(cssText))!==null) propHits.push(m[1]);

    /* 2 — background-color values throughout CSS */
    const bgRx = /background(?:-color)?\s*:\s*(#[0-9a-fA-F]{3,6})/gi;
    const bgHits = [];
    while((m=bgRx.exec(cssText))!==null) bgHits.push(m[1]);

    /* 3 — inline styles on buttons / CTAs */
    const btnHits = [...doc.querySelectorAll('button,a[class*=btn],a[class*=cta],[class*=primary],[class*=brand]')]
      .map(el=>{ const s=el.getAttribute('style')||''; const hm=s.match(/background[^:]*:\s*(#[0-9a-fA-F]{3,6})/i); return hm?hm[1]:null; })
      .filter(Boolean);

    const all = [...propHits, ...btnHits, ...bgHits];
    if(!all.length) return null;

    /* Score by saturation + mid-lightness preference */
    const toRgb = h => {
      const c = h.replace('#','').padEnd(6, h.slice(-3).repeat(2));
      return [parseInt(c.substr(0,2),16), parseInt(c.substr(2,2),16), parseInt(c.substr(4,2),16)];
    };
    const scored = all.map(hex=>{
      const [r,g,b] = toRgb(hex);
      const max=Math.max(r,g,b), min=Math.min(r,g,b);
      const lum=(0.299*r+0.587*g+0.114*b);
      const sat=max===0?0:(max-min)/max;
      if(sat<0.22||lum<25||lum>215) return null;
      return {hex, score: sat*(1-Math.abs(lum-120)/130)};
    }).filter(Boolean).sort((a,b)=>b.score-a.score);

    if(!scored.length) return null;
    const accent = scored[0].hex;
    const [r,g,b] = toRgb(accent);
    const dark = '#'+[r,g,b].map(c=>Math.round(c*.7).toString(16).padStart(2,'0')).join('');
    return {accent, dark};
  }catch(e){ return null; }
}

(function(){
var io=new IntersectionObserver(function(entries){

  });
},{threshold:0.1,rootMargin:'0px 0px -36px 0px'});

function addFade(els,delayClass){
  els.forEach(function(el,i){
    el.classList.add('xla');
    if(delayClass) el.classList.add('xld'+(Math.min(6,(i%6)+1)));
    io.observe(el);
  });
}

function initAnimations(){
  /* Section-level fade */
  addFade(document.querySelectorAll('.sec,.section,.xl-stats,.xl-faq,.xl-gallery,.cta-sec,.cta,.trust'));
  /* Card stagger */
  addFade(document.querySelectorAll('.sc,.wi,.feat,.rc,.xl-faq-item,.xl-gitem,.wg .wi'),true);

  /* Count-up for stats */
  var cio=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(!e.isIntersecting) return;
      var el=e.target, target=parseFloat(el.dataset.target), suf=el.dataset.suf||'', dec=target%1?1:0;
      var start=null, dur=1600;
      function step(ts){
        if(!start) start=ts;
        var p=Math.min(1,(ts-start)/dur), ease=1-Math.pow(1-p,3);
        el.textContent=(target*ease).toFixed(dec)+suf;
        if(p<1) requestAnimationFrame(step); else el.textContent=target.toFixed(dec)+suf;
      }
      requestAnimationFrame(step);
      cio.unobserve(el);
    });
  },{threshold:0.5});

  document.querySelectorAll('.xl-sn').forEach(function(el){
    var raw=el.textContent.trim().replace(/,/g,'');
    var nm=raw.match(/^([0-9]+(?:\.[0-9]+)?)/);
    if(!nm) return;
    var num=parseFloat(nm[1]);
    if(!num) return;
    el.dataset.target=num;
    el.dataset.suf=raw.slice(nm[1].length);
    el.textContent='0'+el.dataset.suf; el.textContent='0'+el.dataset.suf;
    cio.observe(el);
  });

  /* Smooth scroll for anchor links */
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      var t=document.querySelector(a.getAttribute('href'));
      if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth',block:'start'});}
    });
  });

  /* Sticky nav shadow */
  var nav=document.querySelector('nav');
  if(nav){
    window.addEventListener('scroll',function(){
      nav.classList.toggle('xl-stuck',window.scrollY>40);
    },{passive:true});
  }
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',initAnimations);
}else{ initAnimations(); }
})();
<\/script>`;
}

function buildExtraSections(cfg, ai, tmpl, images=[]){
  const isDark   = tmpl==='bold';
  const isBrut   = tmpl==='brutalist';
  const bg       = isDark ? '#0d0f12' : isBrut ? '#fff' : '#f8fafc';
  const textMain = isDark ? '#f1f5f9' : '#0f172a';
  const textSub  = isDark ? '#64748b' : '#64748b';
  const accent   = 'var(--a)';
  const radius   = isBrut ? '0' : '12px';

  /* Build stats — real lead data takes priority, then AI, then sensible defaults */
  const cleanNum = s => String(s).replace(/,/g,'').trim();
  const ratingNum = cfg.rating ? parseFloat(cfg.rating) : (ai.stats&&ai.stats[2] ? parseFloat(cleanNum(ai.stats[2].num)) : 4.9);
  const reviewNum = cfg.reviewCount ? parseInt(cfg.reviewCount) : null;
  const aiJobsRaw = ai.stats&&ai.stats[0] ? cleanNum(ai.stats[0].num) : '';
  const aiYrsRaw  = ai.stats&&ai.stats[1] ? cleanNum(ai.stats[1].num) : '';
  const stats = [
    {num: (aiJobsRaw.match(/^[0-9]+/) ? aiJobsRaw : '250+'), label:'Jobs Completed'},
    {num: (aiYrsRaw.match(/^[0-9]+/)  ? aiYrsRaw  : '10+'),  label:'Years in '+cfg.city},
    {num: (ratingNum >= 1 && ratingNum <= 5 ? ratingNum.toFixed(1)+'★' : '4.9★'), label:'Google Rating'},
    {num: reviewNum ? reviewNum+'+' : (ai.stats&&ai.stats[3] ? cleanNum(ai.stats[3].num) : '150+'), label:'Happy Customers'},
  ];

  const faqs = ai.faqs || [
    {q:`Do you offer free estimates?`,  a:`Yes — free, no-obligation estimates for all ${cfg.niche} work in ${cfg.city} and surrounding areas.`},
    {q:`Are you licensed and insured?`, a:`Absolutely. ${cfg.shortName} is fully licensed, bonded, and insured. Your property and our crew are always protected.`},
    {q:`How quickly can you respond?`,  a:`We typically respond within hours. For emergencies we're available 24/7 — just call us directly.`},
    {q:`What areas do you serve?`,      a:`We serve ${cfg.city} and the surrounding area. Call us to confirm we cover your location.`},
    {q:`How do I get started?`,         a:`Call or fill out our contact form. We'll schedule a free visit, assess the job, and give you an honest quote with no pressure.`},
  ];

  const statsBorder = isBrut ? 'border-top:3px solid #111;border-bottom:3px solid #111' : '';
  const faqBorder   = isBrut ? 'border-bottom:3px solid #111' : '';

  /* Gallery section — only rendered when real images scraped */
  const galleryHtml = images.length > 0 ? `
<style>
/* ── Photo showcase ── */
.xl-showcase{padding:0;background:${isDark?'#050608':isBrut?'#fff':'#f8fafc'};${isBrut?'border-bottom:3px solid #111':''}}
.xl-showcase-feat{display:grid;grid-template-columns:${images.length>=3?'1.6fr 1fr':'1fr'};gap:3px;max-height:520px}
.xl-showcase-main{position:relative;overflow:hidden;background:#1a1d20}
.xl-showcase-main img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
.xl-showcase-main:hover img{transform:scale(1.04)}
.xl-showcase-stack{display:flex;flex-direction:column;gap:3px}
.xl-showcase-sm{position:relative;overflow:hidden;background:#1a1d20;flex:1}
.xl-showcase-sm img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
.xl-showcase-sm:hover img{transform:scale(1.06)}
.xl-photo-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 55%);pointer-events:none}
.xl-photo-label{position:absolute;bottom:14px;left:16px;color:#fff;font-size:12px;font-weight:600;letter-spacing:.04em;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.xl-showcase-hd{padding:48px 5% 36px;text-align:center}
.xl-gal-ey{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:${accent};margin-bottom:10px}
.xl-gal-title{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:${isBrut?900:800};letter-spacing:-.02em;color:${textMain};${isBrut?'text-transform:uppercase':''}}
/* extra grid for 4+ images */
.xl-gal-extra{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:3px;max-height:300px}
.xl-gitem{overflow:hidden;background:${isDark?'#1a1d20':'#e2e8f0'};position:relative}
.xl-gitem img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease}
.xl-gitem:hover img{transform:scale(1.07)}
${isBrut?'.xl-showcase-feat,.xl-gal-extra{gap:0;outline:3px solid #111}':''}
${isDark?'.xl-showcase{background:#050608}':''}
@media(max-width:640px){.xl-showcase-feat{grid-template-columns:1fr;max-height:none}.xl-showcase-stack{flex-direction:row;max-height:180px}}
</style>
<section class="xl-showcase">
  <div class="xl-showcase-hd">
    <div class="xl-gal-ey">Our Work</div>
    <h2 class="xl-gal-title">${cfg.niche} in ${cfg.city}</h2>
  </div>
  <!-- featured layout: 1 large + up to 2 stacked -->
  <div class="xl-showcase-feat">
    <div class="xl-showcase-main">
      <img src="${images[0].src}" alt="${images[0].alt||cfg.niche+' '+cfg.city}" loading="lazy" onerror="this.closest('.xl-showcase-main').style.display='none'">
      <div class="xl-photo-overlay"></div>
      <div class="xl-photo-label">${cfg.name}</div>
    </div>
    ${images.length>=3?`<div class="xl-showcase-stack">
      <div class="xl-showcase-sm"><img src="${images[1].src}" alt="${images[1].alt||cfg.niche}" loading="lazy" onerror="this.closest('.xl-showcase-sm').style.display='none'"><div class="xl-photo-overlay"></div></div>
      <div class="xl-showcase-sm"><img src="${images[2].src}" alt="${images[2].alt||cfg.niche}" loading="lazy" onerror="this.closest('.xl-showcase-sm').style.display='none'"><div class="xl-photo-overlay"></div></div>
    </div>`:''}
  </div>
  <!-- extra photos grid for 4+ -->
  ${images.length>3?`<div class="xl-gal-extra">
    ${images.slice(3).map((img,i)=>`<div class="xl-gitem" style="height:200px"><img src="${img.src}" alt="${img.alt||cfg.niche+' '+(i+4)}" loading="lazy" onerror="this.closest('.xl-gitem').style.display='none'"></div>`).join('')}
  </div>`:''}
</section>` : '';

  const statsHtml = `
<style>
.xl-stats{padding:56px 5%;background:${isDark?'#050608':isBrut?'#111':'var(--d)'};${statsBorder}}
.xl-stats-inner{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:24px;max-width:900px;margin:0 auto;text-align:center}
.xl-sn{font-size:2.8rem;font-weight:900;line-height:1;margin-bottom:6px;color:#fff}
.xl-sl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.6;color:#fff}
</style>
<section class="xl-stats">
  <div class="xl-stats-inner">
    ${stats.map(s=>`<div><div class="xl-sn">${s.num}</div><div class="xl-sl">${s.label}</div></div>`).join('')}
  </div>
</section>`;

  const faqHtml = `
<style>
.xl-faq{padding:80px 5%;background:${bg};${faqBorder}}
.xl-faq-hd{text-align:center;margin-bottom:48px}
.xl-faq-ey{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:${accent};margin-bottom:10px}
.xl-faq-title{font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:${isBrut?900:800};letter-spacing:${isBrut?'-.03em':'-.02em'};color:${textMain};${isBrut?'text-transform:uppercase':''}}
.xl-faq-list{max-width:720px;margin:0 auto}
.xl-faq-item{border-bottom:${isDark?'1px solid rgba(255,255,255,.08)':'1.5px solid #e2e8f0'}}
.xl-faq-q{width:100%;background:none;border:none;text-align:left;padding:18px 0;font-size:14.5px;font-weight:700;color:${textMain};cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;font-family:inherit}
.xl-faq-q:hover .xl-faq-icon{background:${accent};color:#fff;border-color:transparent}
.xl-faq-icon{width:26px;height:26px;border-radius:50%;border:1.5px solid ${isDark?'rgba(255,255,255,.2)':'#d1d5db'};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:300;flex-shrink:0;transition:all .14s;color:${isDark?'#94a3b8':'#6b7280'}}
.xl-faq-a{font-size:13.5px;color:${textSub};line-height:1.75;padding:0 32px 18px 0;display:none}
</style>
<section class="xl-faq">
  <div class="xl-faq-hd">
    <div class="xl-faq-ey">FAQ</div>
    <h2 class="xl-faq-title">Common Questions</h2>
  </div>
  <div class="xl-faq-list">
    ${faqs.map((f,i)=>`
    <div class="xl-faq-item">
      <button class="xl-faq-q" onclick="(function(btn){var a=btn.nextElementSibling,ic=btn.querySelector('.xl-faq-icon'),open=a.style.display==='block';a.style.display=open?'none':'block';ic.textContent=open?'+':'−';})(this)">
        <span>${f.q}</span><span class="xl-faq-icon">+</span>
      </button>
      <div class="xl-faq-a">${f.a}</div>
    </div>`).join('')}
  </div>
</section>`;

  return galleryHtml + statsHtml + faqHtml;
}


/* ── DEMO BUILDER ────────────────────────────────────────── */
function DemoBuilder({savedLeads, apiKeys={}}){
  const [selId,    setSelId]    = useState('');
  const [manual,   setManual]   = useState(false);
  const [man,      setMan]      = useState({name:'',niche:'Roofing',city:'',phone:''});
  const [tmpl,     setTmpl]     = useState('modern');
  const [preview,  setPreview]  = useState(null);
  const [enhancing,setEnhancing]= useState(false);
  const [enhMsg,   setEnhMsg]   = useState('');
  const [siteInfo, setSiteInfo] = useState(null);
  const [siteImgs, setSiteImgs] = useState([]);

  const hasAiKey = !!(apiKeys.openrouter || apiKeys.groq);

  const lead = manual
    ? {name:man.name||'Your Business Name',niche:man.niche,location:man.city,phone:man.phone,saved:true}
    : savedLeads.find(l=>l.id===selId);

  /* Core enhance — takes explicit params so it can be called from generate() */
  const runEnhance = async (currentLead, currentTmpl, baseHtml) => {
    if(enhancing) return;
    setEnhancing(true);
    const city = (currentLead.location||currentLead.city||'').split(',')[0].trim()||'your city';

    /* 1 — Scrape their existing site: text + images */
    let siteContext = '';
    let siteImages  = [];
    let rawHtml = null;
    if(currentLead.website){
      setEnhMsg('⟳ Fetching their website…');
      try{
        const raw = await fetchLeadWebsite(currentLead.website);
        rawHtml = raw;
        if(raw){
          siteContext = extractSiteContent(raw);
          siteImages  = extractImages(raw, currentLead.website);
          setSiteInfo(siteContext.substring(0,120)+'…');
          setSiteImgs(siteImages);
        }
      }catch(e){ /* silent — continue without scrape */ }
    }

    const siteBlock = siteContext
      ? `\n\nEXISTING WEBSITE CONTENT (use this to personalise — mirror their tone, use their real service names, reflect their actual strengths):\n${siteContext}`
      : '';

    setEnhMsg('✦ Writing personalized copy…');

    const nc = getNiche(currentLead.niche);
    const issueLabels = currentLead.issues?.map(ik => ISSUE_TYPES[ik]?.label || ik).join(', ') || 'weak online presence';

    const prompt = `You are an expert web copywriter for local service businesses. Write highly specific, conversion-focused copy that directly addresses the lead's actual problems.

LEAD PROFILE:
Business: ${currentLead.name}
Type: ${currentLead.niche}
City: ${city}
Phone: ${currentLead.phone||'(provided separately)'}
Google Reviews: ${currentLead.rating ? `${currentLead.rating}★ across ${currentLead.reviews||'?'} reviews` : 'not available'}
Current Issues: ${issueLabels}
Website: ${currentLead.hasWebsite ? currentLead.website||'yes' : 'none currently'}${siteBlock}

NICHE CONTEXT:
- Customer pain points: People in ${city} looking for ${currentLead.niche} care about: ${nc.painPoints || 'reliability, quality, responsiveness'}
- Customer outcome they want: ${nc.outcome || 'the job done right'}
- What they're losing to competitors: customers finding other ${currentLead.niche} businesses instead of them
- Average job value: ${nc.priceRange}
- Real services this niche offers: ${nc.services?.join(', ') || 'standard services in this field'}

COPY STRATEGY:
- DO NOT write generic "we're great at what we do" copy
- DO address the lead's specific issues (${issueLabels}) directly
- Focus on the OUTCOME customers care about (${nc.outcome}), not features
- Make copy ${city}-specific and ${currentLead.niche}-specific
- Every sentence should answer: "why should someone hire THIS person instead of the other guy down the street?"
- Hero section should feel like it's speaking directly to a customer in this niche with this problem

Return ONLY valid JSON (no explanation, no markdown fences):
{
  "tagline": "powerful 8-12 words addressing the lead's core problem — not generic, mention ${city} and a benefit",
  "heroSubtext": "2 sentences addressing their specific issue (${issueLabels}) — what outcome customers get by hiring them in ${city}",
  "services": ["Real Service 1 that solves problem","Real Service 2","Real Service 3","Real Service 4","Real Service 5","Real Service 6"],
  "whyItems": [
    {"title":"Direct answer to a customer pain point","desc":"2 sentences specific to this niche showing how they solve this problem"},
    {"title":"Why they're better than the alternative","desc":"specific to ${city} and this niche"},
    {"title":"What customer gets as outcome","desc":"specific benefit this niche cares about"},
    {"title":"Trust signal specific to this niche","desc":"why customers should choose them"}
  ],
  "reviews": [
    ["vivid customer story in ${city} with this niche — specific problem they had and result they got","First L."],
    ["different customer outcome in ${city}","First L."],
    ["customer expressing trust/relief in ${city}","First L."]
  ],
  "stats": [
    {"num":"realistic integer — jobs completed in ${city}","label":"Jobs Completed"},
    {"num":"realistic integer — years serving ${city}","label":"Years in ${city}"},
    {"num":"use actual Google rating if provided, else realistic 4.0★-5.0★","label":"Google Rating"},
    {"num":"realistic happy customer count in area","label":"Happy Customers"}
  ],
  "faqs": [
    {"q":"What makes you different from other ${currentLead.niche} in ${city}?","a":"specific answer showing they understand the customer problem"},
    {"q":"How long does a typical job take?","a":"specific to this niche"},
    {"q":"Do you offer guarantees or warranties?","a":"specific promise for this niche"},
    {"q":"How do I schedule service?","a":"simple clear call to action"},
    {"q":"What areas of ${city} do you serve?","a":"mention coverage area in city"}
  ],
  "ctaHeadline": "action-oriented 6-9 words addressing the customer problem",
  "ctaSubtext": "1 friendly sentence with urgency specific to this niche (e.g., availability, time sensitivity)",
  "promoText": "specific offer solving their problem — not generic. tie to ${currentLead.niche} need (e.g., for plumbing: 'emergency callout 24/7')",
  "brandColors": {"accent": "#hexcode — vibrant primary for CTAs/headers", "dark": "#hexcode — 20-30% darker shade"}
}

CRITICAL RULES:
- Every sentence should feel specific to this lead, city, and niche — NO generic service copy
- Reviews sound like real ${city} customers describing real problems solved
- Services are ACTUAL services a ${currentLead.niche} business offers
- "Why hire us" section addresses their ACTUAL pain points, not generic benefits
- Tone: professional but human, focused on outcomes not features`;

    try{
      const raw = await llmComplete(prompt, {maxTokens:2400});
      const m = raw.match(/\{[\s\S]*\}/);
      if(!m) throw new Error('AI returned invalid format');
      const ai = JSON.parse(m[0]);

      setEnhMsg('✦ Applying to design…');
      const baseCfg = buildSiteConfig(currentLead, currentTmpl);
      const enhCfg  = {
        ...baseCfg,
        tagline:     ai.tagline     || baseCfg.tagline,
        services:    Array.isArray(ai.services) && ai.services.length ? ai.services : baseCfg.services,
        reviews:     Array.isArray(ai.reviews)  && ai.reviews.length  ? ai.reviews  : baseCfg.reviews,
        heroSubtext: ai.heroSubtext || baseCfg.heroSubtext,
        whyItems:    Array.isArray(ai.whyItems) && ai.whyItems.length===4 ? ai.whyItems : baseCfg.whyItems,
        ctaHeadline: ai.ctaHeadline || baseCfg.ctaHeadline,
        ctaSubtext:  ai.ctaSubtext  || baseCfg.ctaSubtext,
        promoText:   ai.promoText   || baseCfg.promoText,
      };
      let html = SITE_TEMPLATES[currentTmpl](enhCfg);

      /* Inject extra sections (gallery + stats + FAQ) before </body> */
      const extras = buildExtraSections(baseCfg, ai, currentTmpl, siteImages);
      html = html.replace('</body>', extras + '</body>');

      /* Hero photo — full background with overlay for text readability */
      if(siteImages.length > 0){
        const ph = siteImages[0].src.replace(/'/g,'%27');
        /* Photo layer + dark gradient overlay so existing hero text stays legible */
        const photoLayers = [
          `<div style="position:absolute;inset:0;background:url('${ph}') center/cover no-repeat;z-index:0"></div>`,
          `<div style="position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,.68) 0%,rgba(0,0,0,.42) 60%,rgba(0,0,0,.22) 100%);z-index:0"></div>`,
        ].join('');
        /* Inject into hero — handle both hero and hero-txt templates */
        html = html
          .replace(/<section class="hero"([^>]*)>/, (m,attrs)=>`<section class="hero"${attrs} style="position:relative;overflow:hidden;">${photoLayers}`)
          /* Force hero text elements white so they're readable over any photo */
          .replace(/(<section class="hero"[^>]*>[\s\S]{0,400}?)(<div class="eyebrow">|<div class="hero-tag">|<div class="hero-badge">|<div class="hero-txt">)/,
            (m, pre, tag) => pre + `<style>.hero h1,.hero p,.hero-txt h1,.hero-txt p,.eyebrow,.hero-tag,.hero-badge,.hero-eyebrow{color:#fff!important;text-shadow:0 2px 8px rgba(0,0,0,.4)}</style>` + tag);
      }

      /* Niche SVG — large animated art when no photos; skip when real photos fill the hero */
      {
        const nicheSvgRaw = NICHE_SVG[currentLead.niche] || NICHE_SVG.default;
        if(siteImages.length === 0){
          const svgWrap = `<div style="position:absolute;top:50%;right:3%;transform:translateY(-50%);width:46%;pointer-events:none;z-index:1;color:rgba(255,255,255,0.30)">${nicheSvgRaw}</div>`;
          html = html.replace(/<section class="hero"([^>]*)>/, (m,attrs) => {
            if(/style=/.test(attrs)) return m.replace(/style="([^"]*)"/, 'style="$1;position:relative;overflow:hidden"');
            return `<section class="hero"${attrs} style="position:relative;overflow:hidden;">`;
          });
          html = html.replace(/<div class="eyebrow">|<div class="hero-tag">|<div class="hero-badge">|<div class="hero-txt">/, m => svgWrap + m);
        }
      }


      

/* ── Brand color: scraped site takes priority, then AI suggestion ── */
      const scrapedColors = extractBrandColors(rawHtml);
      const chosenColors = scrapedColors || (ai.brandColors && /^#[0-9a-fA-F]{3,6}$/.test((ai.brandColors.accent||'')) ? ai.brandColors : null);
      if(chosenColors && chosenColors.accent && chosenColors.dark){
        html = html.replace(/:root\s*\{[^}]*--a\s*:[^;]+;[^}]*--d\s*:[^;}]+\}/,
          m => m.replace(/--a\s*:[^;]+;/, `--a:${chosenColors.accent};`).replace(/--d\s*:[^;}]+/, `--d:${chosenColors.dark}`)
        );
      }

      /* ── Animations ── */
      html = html.replace('</body>', buildAnimationScript() + '</body>');

      setPreview(p=>({...p, html, enhanced:true}));
      setEnhMsg(siteContext ? '✓ Enhanced from their real site!' : '✓ AI enhanced!');
      setTimeout(()=>setEnhMsg(''),5000);
    }catch(e){
      const msg = e.message==='no-key' ? 'Add API key in Settings' : `Error: ${e.message}`;
      setEnhMsg(`✗ ${msg}`);
      setTimeout(()=>setEnhMsg(''),5000);
    }
    setEnhancing(false);
  };

  /* generate — build base template + extra sections, then auto-enhance */
  const generate = async () => {
    if(!lead) return;
    setEnhMsg('');
    setSiteInfo(null);
    setSiteImgs([]);
    const cfg      = buildSiteConfig(lead, tmpl);
    const baseHtml = SITE_TEMPLATES[tmpl](cfg);
    /* Inject default extra sections right away */
    const extras   = buildExtraSections(cfg, {}, tmpl, []);
    const html     = baseHtml.replace('</body>', extras + buildAnimationScript() + '</body>');
    setPreview({html, name:lead.name, tmpl, enhanced:false});
    /* Auto-enhance if key present */
    if(hasAiKey) runEnhance(lead, tmpl, html);
  };

  /* Manual re-enhance button */
  const aiEnhance = () => {
    if(!preview || !lead) return;
    runEnhance(lead, tmpl, preview.html);
  };

  const openPreview = () => {
    if(!preview) return;
    const blob = new Blob([preview.html], {type:'text/html'});
    const url  = URL.createObjectURL(blob);
    window.open(url,'_blank');
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
  };

  const download = () => {
    if(!preview) return;
    const blob = new Blob([preview.html], {type:'text/html'});
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = `${(preview.name||'demo').replace(/[^a-z0-9]/gi,'-').toLowerCase()}-website.html`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  };

  const TMPLS = [
    {id:'modern',    label:'Premium Pro',    desc:'Inter font, gradient hero, card-based'},
    {id:'bold',      label:'Dark Tech',      desc:'Dark bg, glow effects, high-contrast'},
    {id:'clean',     label:'Warm Editorial', desc:'Playfair serif, parchment tones, classic'},
    {id:'stripe',    label:'Stripe Style',   desc:'White, gradient band, premium light'},
    {id:'brutalist', label:'Brutalist',      desc:'Raw, oversized type, thick borders'},
  ];

  const nc = lead ? getSiteNiche(lead.niche) : null;

  return(
    <div style={{display:'flex',gap:16,height:'calc(100vh - 140px)',overflow:'hidden'}}>
      {/* LEFT PANEL */}
      <div style={{width:290,flexShrink:0,display:'flex',flexDirection:'column',gap:12,overflowY:'auto',paddingRight:4}}>

        <div className="settings-block" style={{padding:16}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Select Lead</div>
          <div style={{display:'flex',gap:6,marginBottom:12}}>
            <button className={`chip${!manual?' on':''}`} style={{flex:1,textAlign:'center'}} onClick={()=>setManual(false)}>Saved Lead</button>
            <button className={`chip${manual?' on':''}`} style={{flex:1,textAlign:'center'}} onClick={()=>setManual(true)}>Manual</button>
          </div>
          {!manual ? (
            savedLeads.length ? (
              <select className="field-input" style={{fontSize:12}} value={selId} onChange={e=>setSelId(e.target.value)}>
                <option value="">— pick a lead —</option>
                {savedLeads.map(l=><option key={l.id} value={l.id}>{l.name} · {l.niche}</option>)}
              </select>
            ) : <div style={{fontSize:12,color:'var(--text3)'}}>No saved leads yet. Save some from Lead Search first.</div>
          ):(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <input className="field-input" style={{fontSize:12}} placeholder="Business Name" value={man.name} onChange={e=>setMan(m=>({...m,name:e.target.value}))}/>
              <select className="field-input" style={{fontSize:12}} value={man.niche} onChange={e=>setMan(m=>({...m,niche:e.target.value}))}>
                {Object.keys(NICHE_SITE).map(n=><option key={n}>{n}</option>)}
              </select>
              <input className="field-input" style={{fontSize:12}} placeholder="City, State" value={man.city} onChange={e=>setMan(m=>({...m,city:e.target.value}))}/>
              <input className="field-input" style={{fontSize:12}} placeholder="Phone Number" value={man.phone} onChange={e=>setMan(m=>({...m,phone:e.target.value}))}/>
            </div>
          )}
        </div>

        <div className="settings-block" style={{padding:16}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Template Style</div>
          {TMPLS.map(t=>(
            <div key={t.id} onClick={()=>setTmpl(t.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:'var(--rsm)',border:`1.5px solid ${tmpl===t.id?'var(--amber)':'var(--border)'}`,background:tmpl===t.id?'rgba(240,160,32,.06)':'transparent',cursor:'pointer',marginBottom:7,transition:'all .13s'}}>
              <div style={{width:28,height:20,borderRadius:3,background:nc?nc.accent:'#2b6cb0',flexShrink:0,opacity:tmpl===t.id?1:.5}}></div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:tmpl===t.id?'var(--amber)':'var(--text1)'}}>{t.label}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{t.desc}</div>
              </div>
              {tmpl===t.id&&<div style={{marginLeft:'auto',color:'var(--amber)',fontSize:14}}>✓</div>}
            </div>
          ))}
        </div>

        {lead && (
          <div className="settings-block" style={{padding:16}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--text3)',marginBottom:10}}>Lead Info</div>
            <div style={{fontSize:12,color:'var(--text2)',display:'flex',flexDirection:'column',gap:5}}>
              <div><span style={{color:'var(--text3)'}}>Name:</span> {lead.name}</div>
              <div><span style={{color:'var(--text3)'}}>Niche:</span> {lead.niche||'—'}</div>
              <div><span style={{color:'var(--text3)'}}>City:</span> {(lead.location||'').split(',')[0]||'—'}</div>
              <div><span style={{color:'var(--text3)'}}>Phone:</span> {lead.phone||'—'}</div>
              {lead.website&&<div style={{display:'flex',alignItems:'center',gap:5}}><span style={{color:'var(--text3)'}}>Site:</span><span style={{color:'var(--green)',fontSize:11}}>✓ will scrape</span></div>}
              {nc&&<div style={{marginTop:6,display:'flex',alignItems:'center',gap:6}}><div style={{width:14,height:14,borderRadius:3,background:nc.accent}}></div><span style={{color:'var(--text3)',fontSize:11}}>accent color</span></div>}
            </div>
          </div>
        )}

        <button className="btn btn-primary" style={{justifyContent:'center'}} onClick={generate} disabled={enhancing||!lead||(!selId&&!manual)||(manual&&!man.name)}>
          {enhancing
            ? <><span style={{display:'inline-block',animation:'spin 1s linear infinite'}}>⟳</span> {enhMsg||'Building…'}</>
            : <><Ic n="bolt" s={14}/>{hasAiKey?'Build + AI Enhance':'Build Demo Site'}</>}
        </button>

        {preview&&!enhancing&&(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {hasAiKey&&(
              <button onClick={aiEnhance} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:7,padding:'9px 14px',borderRadius:'var(--r)',border:`1.5px solid ${preview.enhanced?'var(--green)':'var(--amber)'}`,background:preview.enhanced?'rgba(39,174,96,.07)':'rgba(240,160,32,.06)',color:preview.enhanced?'var(--green)':'var(--amber)',fontWeight:700,fontSize:12.5,cursor:'pointer',transition:'all .15s'}}>
                <span style={{fontSize:14}}>{preview.enhanced?'✓':'✦'}</span>
                {preview.enhanced?'Re-enhance with AI':'AI Enhance'}
                {siteInfo&&<span style={{fontSize:10,opacity:.7,marginLeft:2}}>+site</span>}
              </button>
            )}
            {enhMsg&&<div style={{fontSize:11.5,textAlign:'center',color:enhMsg.startsWith('✓')?'var(--green)':enhMsg.startsWith('✗')?'var(--red)':'var(--amber)',padding:'4px 8px',borderRadius:4,background:'var(--s3)',lineHeight:1.4}}>{enhMsg}</div>}
            {siteInfo&&<div style={{fontSize:10.5,color:'var(--text3)',padding:'6px 10px',background:'var(--s3)',borderRadius:4,borderLeft:'2px solid var(--green)',lineHeight:1.5}}><span style={{color:'var(--green)',fontWeight:700}}>Scraped:</span> {siteInfo}</div>}
            <div style={{height:1,background:'var(--border)',margin:'2px 0'}}/>
            <button className="btn" style={{justifyContent:'center',background:'var(--green)',color:'#000',border:'none'}} onClick={openPreview}>
              <Ic n="search" s={13}/>Open Full Preview
            </button>
            <button className="btn btn-ghost" style={{justifyContent:'center'}} onClick={download}>
              <Ic n="save" s={13}/>Download HTML
            </button>
          </div>
        )}

        <div style={{padding:'12px 14px',background:'rgba(240,160,32,.06)',border:'1px solid rgba(240,160,32,.15)',borderRadius:'var(--r)',fontSize:11.5,color:'var(--text3)',lineHeight:1.55}}>
          <strong style={{color:'var(--amber)'}}>Zoom call tip:</strong> Build the demo before the call, open full preview, then screen-share it live. They see their own business name on a real-looking site. Closes fast.
          {!hasAiKey&&<div style={{marginTop:6,color:'var(--amber)',fontWeight:600}}>Add API key in Settings for AI-personalized copy.</div>}
        </div>
      </div>

      {/* PREVIEW PANEL */}
      <div style={{flex:1,display:'flex',flexDirection:'column',gap:0,border:'1px solid var(--border)',borderRadius:'var(--r)',overflow:'hidden',background:'var(--s2)'}}>
        {preview ? (
          <>
            <div style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10,background:'var(--s3)',flexShrink:0}}>
              <div style={{display:'flex',gap:5}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:'#ff5f57'}}></div>
                <div style={{width:10,height:10,borderRadius:'50%',background:'#febc2e'}}></div>
                <div style={{width:10,height:10,borderRadius:'50%',background:'#28c840'}}></div>
              </div>
              <div style={{flex:1,background:'var(--s2)',border:'1px solid var(--border)',borderRadius:4,padding:'3px 10px',fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)',display:'flex',alignItems:'center',gap:8}}>
                <span>{preview.name.toLowerCase().replace(/\s+/g,'-')}.com</span>
                {enhancing&&<span style={{fontSize:10,color:'var(--amber)',fontWeight:700,animation:'pulse 1s ease-in-out infinite'}}>✦ AI enhancing…</span>}
                {!enhancing&&preview.enhanced&&<span style={{fontSize:10,fontWeight:700,background:'var(--amber)',color:'#000',padding:'1px 6px',borderRadius:3,fontFamily:'var(--sans)'}}>✦ AI</span>}
                {!enhancing&&preview.enhanced&&siteInfo&&<span style={{fontSize:10,fontWeight:700,background:'var(--green)',color:'#000',padding:'1px 6px',borderRadius:3,fontFamily:'var(--sans)'}}>scraped</span>}
              </div>
              <button onClick={openPreview} style={{fontSize:11,padding:'4px 10px',background:'var(--amber)',border:'none',borderRadius:4,color:'#000',fontWeight:700,cursor:'pointer'}}>↗ New Tab</button>
            </div>
            <iframe
              srcDoc={preview.html}
              style={{flex:1,border:'none',width:'100%'}}
              title="Site Preview"
              sandbox="allow-same-origin allow-scripts allow-forms"
            />
          </>
        ) : (
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,color:'var(--text3)',padding:40,textAlign:'center'}}>
            <span style={{fontSize:48}}>🌐</span>
            <div style={{fontSize:15,fontWeight:700,color:'var(--text2)'}}>Demo Site Preview</div>
            <div style={{fontSize:13,maxWidth:360,lineHeight:1.6}}>
              {hasAiKey
                ? <>Select a lead, pick a template, hit <strong style={{color:'var(--amber)'}}>Build + AI Enhance</strong>. The AI will scrape their existing site (if they have one) and write personalized copy automatically.</>
                : <>Select a lead, pick a template style, and hit <strong style={{color:'var(--amber)'}}>Build Demo Site</strong>. Add an API key in Settings to enable AI personalization.</>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


/* ── MODAL ───────────────────────────────────────────────── */
function Modal({lead,onClose,onSave,savedLeads}){
  const [analysis,setAnalysis]=useState(null);
  const [aLoading,setALoading]=useState(false);
  const [audit,setAudit]=useState(null);      // PageSpeed result
  const [whois,setWhois]=useState(null);       // Who-Dat result
  const [auditLoading,setAuditLoading]=useState(false);
  const [saved,setSaved]=useState(!!savedLeads.find(l=>l.id===lead.id));

  useEffect(()=>{
    // AI analysis
    (async()=>{
      setALoading(true);
      try{
        const reviewStr = lead.rating ? `${lead.rating}★ (${lead.reviews??'?'} reviews)` : 'No reviews data';
        const text=await llmComplete(`You are a web agency sales expert. Analyze this local business lead for a sales rep.

Business: ${lead.name}
Niche: ${lead.niche}, Location: ${lead.location}
Website: ${lead.hasWebsite?lead.website:lead.hasFbOnly?'Facebook only':'No website'}
Known issues: ${lead.issues?.map(k=>ISSUE_TYPES[k]?.label).join(', ')||'None'}
${reviewStr} · Opportunity score: ${lead.score}/100

Write 2–3 sentences:
1. Their biggest problem — be specific, name the business damage
2. Your exact pitch angle — what to offer and why they need it right now
Keep it sharp, lowercase where natural, no fluff.`);
        setAnalysis(text);
      }catch(e){setAnalysis(e.message==='no-key'?'Add an OpenRouter or Groq API key in Settings to enable AI analysis.':'AI analysis unavailable — check your connection.');}
      setALoading(false);
    })();

    // Real website audit (PageSpeed + WHOIS) — only if they have a website
    if(lead.hasWebsite && lead.website){
      (async()=>{
        setAuditLoading(true);
        const [ps, wi] = await Promise.all([runPageSpeed(lead.website), runWhois(lead.website)]);
        setAudit(ps); setWhois(wi);
        setAuditLoading(false);
      })();
    }
  },[]);

  const ssl = lead.hasWebsite && lead.website ? lead.website.startsWith('https') : false;

  // Format domain expiry for pitch use
  const expiryNote = ()=>{
    if(!whois?.exp) return null;
    try{
      const exp = new Date(whois.exp);
      const days = Math.round((exp-Date.now())/86400000);
      if(days < 0)  return {text:'Domain EXPIRED',cls:'bad'};
      if(days < 60) return {text:`Domain expires in ${days}d`,cls:'bad'};
      if(days < 180)return {text:`Domain expires in ${Math.round(days/30)}mo`,cls:'warn'};
      return {text:`Domain expires ${exp.toLocaleDateString()}`,cls:'good'};
    }catch{return null;}
  };
  const expiry = expiryNote();

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head">
          <div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
              <div className={`score ${sc(lead.score)}`} style={{width:40,height:40,fontSize:13}}>{lead.score}</div>
              <div className="modal-title">{lead.name}</div>
            </div>
            <div className="modal-sub">
              {lead.niche} · {lead.location}
              {lead.rating ? ` · ${lead.rating}★ (${lead.reviews??0} reviews)` : ''}
              {lead.source==='simulated' && <span style={{marginLeft:8,fontSize:10,background:'var(--amberDim)',color:'var(--amber)',border:'1px solid rgba(240,160,32,.3)',padding:'1px 7px',borderRadius:4,fontWeight:700}}>DEMO</span>}
            </div>
          </div>
          <button className="modal-close" onClick={onClose}><Ic n="x" s={13}/></button>
        </div>

        {/* AI */}
        <div className="ai-box">
          <div className="ai-box-head"><Ic n="ai" s={12}/>AI Sales Intelligence</div>
          {aLoading?(
            <div className="ai-dots"><span className="ai-d dot1"/><span className="ai-d dot2"/><span className="ai-d dot3"/><span style={{marginLeft:4,fontSize:12,color:'var(--text3)'}}>Analyzing lead...</span></div>
          ):(
            <div className="ai-text">{analysis}</div>
          )}
        </div>

        {/* REAL WEBSITE AUDIT */}
        <div className="audit">
          <div className="audit-title"><Ic n="globe" s={11}/>Website Audit {auditLoading&&<span style={{fontSize:10,color:'var(--amber)',marginLeft:6}}>running live check...</span>}</div>
          {(()=>{
            const rows = [
              ['Website', lead.hasWebsite
                ? <a href={lead.website} target="_blank" rel="noreferrer" style={{color:'var(--amber)',fontSize:12}}>{lead.website.replace(/^https?:\/\//,'').slice(0,40)}</a>
                : lead.hasFbOnly ? 'Facebook Only' : lead.mapsUrl
                  ? <a href={lead.mapsUrl} target="_blank" rel="noreferrer" style={{color:'var(--blue)',fontSize:12}}>📍 View on Google Maps</a>
                  : 'No website',
                lead.hasWebsite?'neutral':lead.hasFbOnly?'warn':'bad'],
            ];
            if(lead.hasWebsite){
              // Show site quality grade when we have audit data
              if(audit){
                const sq = getSiteQuality(lead, audit.perf, audit.mobile);
                const gradeColor = sq.cls==='critical'?'var(--red)':sq.cls==='warn'?'var(--amber)':sq.cls==='ok'?'var(--green)':'var(--text2)';
                rows.push(['Site Quality', <span style={{color:gradeColor,fontWeight:700}}>{sq.label} — {sq.tip}</span>, sq.cls==='critical'?'bad':sq.cls==='warn'?'warn':'good']);
                rows.push(['HTTPS / SSL', ssl?'✓ Secure':'✕ Not Secure — Chrome shows warning', ssl?'good':'bad']);
                rows.push(['Load Speed (mobile)', audit.perf < 50 ? `${audit.fcp||'?'} — Score ${audit.perf}/100 🔴` : audit.perf < 80 ? `${audit.fcp||'?'} — Score ${audit.perf}/100 🟡` : `${audit.fcp||'?'} — Score ${audit.perf}/100 🟢`, audit.perf < 50 ? 'bad' : audit.perf < 80 ? 'warn' : 'good']);
                rows.push(['Mobile Friendly', audit.mobile?'✓ Yes':'✕ No — losing 60% of searchers', audit.mobile?'good':'bad']);
              } else if(auditLoading){
                rows.push(['HTTPS / SSL', ssl?'✓ Secure':'✕ Not Secure — Chrome shows warning', ssl?'good':'bad']);
                rows.push(['Live Audit', 'Running PageSpeed check...','neutral']);
              } else {
                const sq = getSiteQuality(lead);
                const gradeColor = sq.cls==='critical'?'var(--red)':sq.cls==='warn'?'var(--amber)':'var(--text2)';
                rows.push(['Site Quality', <span style={{color:gradeColor}}>{sq.label} — {sq.tip}</span>, sq.cls==='critical'?'bad':sq.cls==='warn'?'warn':'neutral']);
                rows.push(['HTTPS / SSL', ssl?'✓ Secure':'✕ Not Secure — Chrome shows warning', ssl?'good':'bad']);
              }
            }
            if(expiry) rows.push(['Domain Expiry', expiry.text, expiry.cls]);
            rows.push(['Phone', lead.phone
              ? <a href={`tel:${lead.phone}`} style={{color:'var(--green)',fontFamily:'var(--mono)',fontSize:12}}>{lead.phone}</a>
              : '✕ Not listed publicly', lead.phone?'good':'bad']);
            if(lead.address && lead.address !== lead.location) rows.push(['Address', lead.address, 'neutral']);
            return rows.filter(Boolean).map(([k,v,cls])=>(
              <div key={k} className="audit-row">
                <div className="audit-key">{k}</div>
                <div className={`audit-val ${cls}`}>{v}</div>
              </div>
            ));
          })()}
        </div>

        {/* DAMAGES */}
        {lead.damages?.length>0&&(
          <div className="audit">
            <div className="audit-title"><Ic n="warn" s={11}/>Business Impact</div>
            {lead.damages.map((d,i)=>(
              <div key={i} className="audit-row">
                <div className="audit-key" style={{fontSize:12,color:'var(--red)',gap:7}}><span>⚠</span>{d}</div>
              </div>
            ))}
          </div>
        )}

        {/* SCORE */}
        <div className="audit" style={{marginBottom:18}}>
          <div className="audit-title">📊 Opportunity Score</div>
          <div className="prog-label">
            <span style={{color:'var(--text2)',fontSize:12}}>Lead Quality</span>
            <span style={{color:scColor(lead.score),fontWeight:700,fontFamily:'var(--mono)'}}>{lead.score}/100</span>
          </div>
          <div className="prog-track" style={{marginBottom:8}}>
            <div className="prog-fill" style={{width:`${lead.score}%`,background:`linear-gradient(90deg,${scColor(lead.score)}88,${scColor(lead.score)})`}}/>
          </div>
          <div style={{fontSize:11,color:'var(--text3)'}}>
            {lead.score>=70?'🔥 High priority — reach out today':lead.score>=40?'⚡ Good opportunity — worth contacting':'📋 Lower priority — fewer selling angles'}
          </div>
          <div style={{marginTop:12,paddingTop:11,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:'var(--text3)'}}>Est. monthly value</span>
            <span style={{color:'var(--green)',fontWeight:700,fontFamily:'var(--mono)',fontSize:14}}>${lead.monthlyValue}/mo</span>
          </div>
        </div>

        <div style={{display:'flex',gap:9}}>
          <button className={`btn${saved?'':' btn-primary'}`} style={{flex:1,justifyContent:'center',background:saved?'var(--greenDim)':'var(--amber)',color:saved?'var(--green)':'var(--bg)',border:saved?'1px solid rgba(34,197,94,.3)':'none'}}
            onClick={()=>{onSave(lead);setSaved(true);}} disabled={saved}>
            {saved?<><Ic n="check" s={14}/>Lead Saved</>:<><Ic n="save" s={14}/>Save Lead</>}
          </button>
          <button className="btn btn-ghost" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
